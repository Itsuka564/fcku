<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>FotokopiKu | Dasbor Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #eef2f7; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .app-container { max-width: 1400px; width: 100%; background: white; border-radius: 32px; box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2); overflow: hidden; }
    
    .auth-wrapper { position: relative; background: linear-gradient(135deg, #0f2b3d, #1b4b62); min-height: 700px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .carousel-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .carousel-slide { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s ease-in-out; }
    .carousel-slide.active { opacity: 1; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 43, 61, 0.7); }
    .auth-card { position: relative; z-index: 2; background: rgba(255,255,255,0.96); backdrop-filter: blur(4px); border-radius: 40px; padding: 40px 36px; max-width: 500px; width: 90%; margin: 40px auto; box-shadow: 0 25px 45px rgba(0,0,0,0.2); }
    .input-group { text-align: left; margin-bottom: 20px; }
    .input-group label { font-weight: 600; display: block; margin-bottom: 8px; }
    .input-group input { width: 100%; padding: 12px 16px; border-radius: 40px; border: 1px solid #cbd5e1; background: white; }
    .btn-auth { background: #2c7da0; color: white; width: 100%; padding: 12px; border-radius: 40px; font-weight: bold; border: none; cursor: pointer; font-size: 1rem; transition: 0.2s; }
    .btn-auth:hover { background: #1b5e7a; transform: scale(1.02); }
    .error-msg { color: #e11d48; font-size: 0.8rem; margin-top: 8px; text-align: center; }
    
    .dash-header { background: #0f2b3d; color: white; display: flex; justify-content: space-between; align-items: center; padding: 14px 28px; flex-wrap: wrap; }
    .btn-logout { background: #e67e22; border: none; padding: 8px 24px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-logout:hover { background: #d35400; transform: scale(1.02); }
    .dashboard-main { padding: 32px; background: #f8fafd; min-height: 70vh; }
    
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-card { background: white; border-radius: 40px; padding: 32px; max-width: 650px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: 0 30px 50px rgba(0,0,0,0.3); animation: fadeInUp 0.3s ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal-card h3 { font-size: 1.6rem; margin-bottom: 24px; color: #0f2b3d; border-left: 4px solid #e67e22; padding-left: 16px; }
    
    .admin-dashboard-container { display: grid; grid-template-columns: 2fr 1fr; gap: 28px; }
    .admin-left-col, .admin-right-col { display: flex; flex-direction: column; gap: 28px; }
    .admin-card { background: white; border-radius: 28px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); transition: transform 0.2s; }
    .admin-card:hover { transform: translateY(-2px); }
    .admin-card h3 { font-size: 1.4rem; margin-bottom: 20px; color: #0f2b3d; border-left: 4px solid #e67e22; padding-left: 16px; }
    
    .stock-warning { background: #fff5eb; border-left: 4px solid #e67e22; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; padding: 12px 16px; border-radius: 20px; margin-bottom: 16px; }
    .stock-warning .check-stock-btn { background: #27ae60; border: none; padding: 6px 16px; border-radius: 30px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    
    .queue-item { background: #f9fafc; border-radius: 20px; padding: 16px; margin-bottom: 14px; border: 1px solid #eef2f5; transition: 0.2s; }
    .queue-header { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .queue-title { font-weight: 800; color: #0f2b3d; }
    .queue-actions button { background: #eef2f9; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 0.85rem; margin-right: 8px; transition: 0.2s; }
    .queue-actions button:hover { transform: scale(1.02); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    
    .stock-monitor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 8px; }
    .stock-item { text-align: center; }
    .progress-bar-bg { background: #e2e8f0; border-radius: 20px; height: 12px; overflow: hidden; margin: 10px 0; }
    .progress-fill-stock { background: #2c7da0; height: 100%; width: 0%; border-radius: 20px; transition: width 0.4s ease; }
    
    .admin-actions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-top: 8px; }
    .admin-action-btn { background: linear-gradient(135deg, #f8fafc 0%, #eef2f9 100%); border: 1px solid #e2e8f0; padding: 12px 8px; border-radius: 60px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.3s ease; text-align: center; color: #1e293b; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .admin-action-btn i { font-size: 1.1rem; transition: transform 0.2s; }
    .admin-action-btn:hover { background: linear-gradient(135deg, #2c7da0, #1b4b62); border-color: #2c7da0; color: white; transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(44,125,160,0.4); }
    
    .btn-primary-modern { background: linear-gradient(135deg, #2c7da0, #1b4b62); border: none; padding: 12px 24px; border-radius: 60px; color: white; font-weight: 700; cursor: pointer; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 10px; justify-content: center; }
    .btn-secondary-modern { background: #eef2f9; border: 1px solid #cbd5e1; padding: 12px 24px; border-radius: 60px; color: #475569; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
    
    .price-input-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; gap: 16px; flex-wrap: wrap; }
    .price-input-group label { font-weight: 600; min-width: 180px; }
    .price-input-group input { width: 150px; padding: 10px 14px; border-radius: 30px; border: 1px solid #cbd5e6; }
    
    .completed-list { list-style: none; margin-top: 8px; padding: 0; }
    .footer-copyright { text-align: center; padding: 20px; background: #0a1f2c; color: #94a3b8; font-size: 0.8rem; border-radius: 0 0 28px 28px; }
    
    /* Toast Pop-Up System */
    .custom-toast {
      position: fixed; top: 25px; right: 25px; background: #27ae60; color: white; padding: 16px 28px;
      border-radius: 20px; box-shadow: 0 15px 35px rgba(39, 174, 96, 0.35); display: none; align-items: center;
      gap: 14px; z-index: 99999; font-weight: 700; font-size: 0.95rem; transform: translateX(100px);
      opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .custom-toast.show { transform: translateX(0); opacity: 1; }
    .custom-toast.error { background: #e11d48; box-shadow: 0 15px 35px rgba(225, 29, 72, 0.35); }
    .custom-toast.warning { background: #e67e22; box-shadow: 0 15px 35px rgba(230, 126, 34, 0.35); }
    .custom-toast.info { background: #2c7da0; box-shadow: 0 15px 35px rgba(44, 125, 160, 0.35); }
    
    @media (max-width: 1000px) { .admin-dashboard-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div id="customToast" class="custom-toast"></div>

<div class="app-container" id="appRoot">
  <div id="authPage"></div>
  <div id="adminDashboard" style="display: none;"></div>
</div>

<script>
  // ========== KREDENSIAL ADMIN ==========
  const adminCred = { email: 'admin@fotokopiku.com', password: 'admin123' };
  
  document.getElementById('authPage').innerHTML = `
    <div class="auth-wrapper"><div class="carousel-container"><div class="carousel-slide active" style="background-image: url('https://picsum.photos/id/20/1600/900')"></div></div><div class="overlay"></div><div class="auth-card">
    <div style="text-align:center; margin-bottom:20px;">
        <i class="fas fa-user-shield" style="font-size:3rem; color:#2c7da0;"></i>
        <h2 style="color:#0f2b3d; margin-top:10px;">Autentikasi Admin</h2>
    </div>
    <form id="loginForm"><div class="input-group"><label>Alamat Email</label><input type="email" id="loginEmail" placeholder="admin@fotokopiku.com" required></div><div class="input-group"><label>Kata Sandi</label><input type="password" id="loginPassword" placeholder="••••••••" required></div><button type="submit" class="btn-auth"><i class="fas fa-sign-in-alt"></i> Masuk Sistem</button><div id="loginErrorMsg" class="error-msg"></div></form>
    </div></div>
  `;
  
  // ========== PENGATURAN DATA LOKAL ==========
  let pricing = JSON.parse(localStorage.getItem('fotokopiku_pricing')) || {
    bw_a4: 250, bw_f4: 300, warna_low: 500, warna_mid: 1000, warna_hi: 2000,
    lakban_1: 3000, lakban_2: 5000, lakban_3: 8000,
    soft_1: 3000, soft_2: 6000, soft_3: 8000,
    skripsi_soft: 40000, skripsi_hard: 45000, scan_cd: 20000, laminating: 3000
  };
  function savePricing() { localStorage.setItem('fotokopiku_pricing', JSON.stringify(pricing)); }
  
  let stockData = JSON.parse(localStorage.getItem('fotokopiku_stock')) || { paperA4: 15, paperF4: 80, inkBlack: 45, inkColor: 12 };
  let hiddenWarnings = JSON.parse(localStorage.getItem('fotokopiku_hidden_warnings')) || [];
  function saveStock() { localStorage.setItem('fotokopiku_stock', JSON.stringify(stockData)); }
  function saveHiddenWarnings() { localStorage.setItem('fotokopiku_hidden_warnings', JSON.stringify(hiddenWarnings)); }
  
  let allOrders = []; 
  let queueClosed = localStorage.getItem('fotokopiku_queue_closed') === 'true';

  // ========== SISTEM NOTIFIKASI TOAST ==========
  function showToast(message, type = 'success') {
    const toast = document.getElementById('customToast');
    if (!toast) return;
    let icon = '<i class="fas fa-check-circle" style="font-size:1.3rem;"></i>';
    if (type === 'info') icon = '<i class="fas fa-info-circle" style="font-size:1.3rem;"></i>';
    if (type === 'warning') icon = '<i class="fas fa-exclamation-triangle" style="font-size:1.3rem;"></i>';
    if (type === 'error') icon = '<i class="fas fa-times-circle" style="font-size:1.3rem;"></i>';
    
    toast.innerHTML = `${icon} <span>${message}</span>`;
    toast.className = 'custom-toast';
    if (type !== 'success') toast.classList.add(type);
    
    toast.style.display = 'flex';
    toast.offsetHeight;
    toast.classList.add('show');
    
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => { toast.style.display = 'none'; }, 400);
    }, 3000);
  }

  // ========== FUNGSI UPDATE GRAFIK STOK (ANIMASI REAL-TIME) ==========
  function updateStockUI() {
    const monitor = document.getElementById('stockMonitor');
    if(!monitor) return;
    monitor.innerHTML = `
      <div class="stock-item"><div class="stock-label">Kertas A4</div><div class="progress-bar-bg"><div class="progress-fill-stock" style="width: ${stockData.paperA4}%; background:${stockData.paperA4<20?'#e74c3c':'#2c7da0'};"></div></div><span>${Math.round(stockData.paperA4)}%</span></div>
      <div class="stock-item"><div class="stock-label">Kertas F4</div><div class="progress-bar-bg"><div class="progress-fill-stock" style="width: ${stockData.paperF4}%; background:#2c7da0;"></div></div><span>${Math.round(stockData.paperF4)}%</span></div>
      <div class="stock-item"><div class="stock-label">Tinta Hitam</div><div class="progress-bar-bg"><div class="progress-fill-stock" style="width: ${stockData.inkBlack}%; background:#1e293b;"></div></div><span>${Math.round(stockData.inkBlack)}%</span></div>
      <div class="stock-item"><div class="stock-label">Tinta Warna</div><div class="progress-bar-bg"><div class="progress-fill-stock" style="width: ${stockData.inkColor}%; background:${stockData.inkColor<20?'#e74c3c':'#e67e22'};"></div></div><span>${Math.round(stockData.inkColor)}%</span></div>
    `;
  }

  // ========== KONEKSI API DATABASE (READ & UPDATE) ==========
  async function fetchOrders() {
    try {
        const response = await fetch('http://localhost/fotokopiku/api/orders/read.php?t=' + Date.now());
        const data = await response.json();
        
        if (data.status === 'success') {
            allOrders = data.data; 
            renderQueue();
            renderCompleted();
        }
    } catch (error) {
        console.error("Kesalahan koneksi ke server:", error);
    }
  }

  // ========== ASYNC UPDATE STATUS (DENGAN PENGURANGAN STOK WHITE BOX) ==========
  async function updateOrderStatus(orderId, newStatus) {
    try {
        const response = await fetch('http://localhost/fotokopiku/api/orders/update_status.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: orderId, status: newStatus })
        });
        const result = await response.json();
        
        if(result.status === 'success') {
            const idx = allOrders.findIndex(o => o.id == orderId);
            if(idx !== -1) {
                
                // SISTEM PENGURANGAN STOK OTOMATIS
                // Dieksekusi saat status baru saja diubah menjadi 'diproses'
                if (newStatus === 'diproses' && allOrders[idx].status !== 'diproses') {
                    let order = allOrders[idx];
                    let totalLembar = (parseInt(order.jumlah_halaman) || 1) * (parseInt(order.jumlah_kopian) || 1);
                    
                    // Asumsi: 1 lembar memakan 0.2% kapasitas kertas, 0.1% kapasitas tinta
                    let biayaKertas = totalLembar * 0.2; 
                    let biayaTinta = totalLembar * 0.1;  

                    if (order.ukuran_kertas && order.ukuran_kertas.toLowerCase() === 'f4') {
                        stockData.paperF4 = Math.max(0, stockData.paperF4 - biayaKertas);
                    } else {
                        stockData.paperA4 = Math.max(0, stockData.paperA4 - biayaKertas);
                    }
                    
                    stockData.inkBlack = Math.max(0, stockData.inkBlack - biayaTinta);
                    stockData.inkColor = Math.max(0, stockData.inkColor - (biayaTinta * 0.5));

                    saveStock(); 
                    updateStockUI(); 
                }

                allOrders[idx].status = newStatus;
                renderQueue();     
                renderCompleted(); 
            }
            
            setTimeout(() => {
                if (newStatus === 'selesai') {
                    showToast('Status diperbarui: Dokumen siap untuk diambil.', 'success');
                } else if (newStatus === 'siap_diambil') {
                    showToast('Transaksi selesai. Dokumen telah diserahkan kepada pelanggan.', 'success');
                } else {
                    showToast('Mesin dijalankan. Stok kertas & tinta otomatis dikurangi!', 'info');
                }
            }, 100);
            
            fetchOrders(); 
        } else {
            showToast("Gagal memperbarui status: " + result.message, 'error');
        }
    } catch (error) {
        console.error("Kesalahan Sistem:", error);
    }
  }

  // ========== ANTARMUKA DASBOR ADMIN ==========
  function renderAdminDashboard() {
    const container = document.getElementById('adminDashboard');
    container.innerHTML = `
      <div class="dash-header"><div><h2><i class="fas fa-building"></i> Dasbor Manajemen Admin <span style="font-size:0.8rem; background:#e67e22; padding:4px 8px; border-radius:12px; margin-left:8px;">Pusat</span></h2></div><button class="btn-logout" id="adminLogoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</button></div>
      <div class="dashboard-main">
        <div class="admin-dashboard-container">
          <div class="admin-left-col">
            <div class="admin-card">
              <h3><i class="fas fa-satellite-dish"></i> Radar Antrean Aktif</h3>
              <p style="font-size:0.8rem; color:#27ae60; margin-bottom:15px;"><i class="fas fa-database"></i> Tersinkronisasi dengan Database MySQL</p>
              <div id="stockWarningsContainer"></div>
              ${queueClosed ? '<div class="close-queue-status" style="background:#ffe4e2; color:#b91c1c; padding:12px; border-radius:20px; margin-bottom:16px; text-align:center; font-weight:bold;"><i class="fas fa-ban"></i> STATUS TOKO: DITUTUP (Pemesanan dihentikan)</div>' : ''}
              <div id="queueList"></div>
            </div>
          </div>
          <div class="admin-right-col">
            <div class="admin-card"><h3><i class="fas fa-chart-pie"></i> Pemantauan Stok</h3><div class="stock-monitor-grid" id="stockMonitor"></div></div>
            <div class="admin-card"><h3><i class="fas fa-toolbox"></i> Kontrol Sistem</h3><div class="admin-actions-grid" id="adminActionsGrid"></div></div>
            <div class="admin-card"><h3><i class="fas fa-boxes"></i> Penyelesaian & Arsip</h3><ul class="completed-list" id="completedList"></ul></div>
          </div>
        </div>
      </div>
      <div class="footer-copyright">© 2026 FotokopiKu. Hak Cipta Dilindungi.</div>
    `;
    
    const warningsContainer = document.getElementById('stockWarningsContainer');
    const warnings = [];
    if (stockData.paperA4 < 20 && !hiddenWarnings.includes('paperA4')) warnings.push({ id: 'paperA4', title: 'Kertas A4', value: stockData.paperA4 });
    if (stockData.inkColor < 15 && !hiddenWarnings.includes('inkColor')) warnings.push({ id: 'inkColor', title: 'Tinta Warna', value: stockData.inkColor });
    
    if (warnings.length > 0) {
      warningsContainer.innerHTML = warnings.map(w => `
        <div class="stock-warning">
          <span><strong>⚠️ Peringatan Sistem: Stok ${w.title} Menipis.</strong><br>Kapasitas tersisa: ${Math.round(w.value)}%.</span>
          <button class="check-stock-btn" onclick="showStockUpdateModal('${w.id}')"><i class="fas fa-box-open"></i> Perbarui Stok</button>
        </div>
      `).join('');
    } else { warningsContainer.innerHTML = ''; }
    
    updateStockUI();
    
    document.getElementById('adminActionsGrid').innerHTML = `
      <button class="admin-action-btn" id="setPricingBtn"><i class="fas fa-tags" style="color:#e67e22;"></i> Harga Layanan</button>
      <button class="admin-action-btn" id="stockManagerBtn"><i class="fas fa-boxes" style="color:#2c7da0;"></i> Manajemen Stok</button>
      <button class="admin-action-btn" id="exportReportBtn"><i class="fas fa-file-excel" style="color:#27ae60;"></i> Ekspor Laporan</button>
      <button class="admin-action-btn" id="closeQueueBtn"><i class="fas fa-door-closed" style="color:#e74c3c;"></i> Status Operasional</button>
    `;
    
    document.getElementById('setPricingBtn').addEventListener('click', showPricingModal);
    document.getElementById('stockManagerBtn').addEventListener('click', showStockManagerModal);
    document.getElementById('exportReportBtn').addEventListener('click', exportReport);
    document.getElementById('closeQueueBtn').addEventListener('click', closeQueueModal);
    document.getElementById('adminLogoutBtn').addEventListener('click', () => location.reload());

    fetchOrders();
  }
  
  // ========== MANAJEMEN ANTREAN (KOLOM KIRI) ==========
  function renderQueue() {
    const queueDiv = document.getElementById('queueList');
    if (!queueDiv) return;
    
    let activeOrders = allOrders.filter(o => o.status === 'menunggu' || o.status === 'dikonfirmasi' || o.status === 'diproses');
    
    if (activeOrders.length === 0) {
        queueDiv.innerHTML = '<div style="text-align:center; padding:30px; background:#f9fafc; border-radius:24px; border:2px dashed #cbd5e1; color:#94a3b8;"><i class="fas fa-inbox" style="font-size:3rem; margin-bottom:15px; color:#cbd5e1;"></i><br><h3 style="color:#64748b;">Tidak ada antrean.</h3><p>Belum ada pesanan masuk saat ini.</p></div>';
        return;
    }

    queueDiv.innerHTML = activeOrders.map(job => {
      let fileName = job.nama_file || "Dokumen_Tanpa_Nama.pdf";
      let totalHarga = parseInt(job.total_tagihan) || 0;
      let detailInfo = `${job.ukuran_kertas.toUpperCase()} | ${job.jumlah_halaman} Halaman | ${job.jumlah_kopian} Salinan | Jilid: ${job.jenis_jilid}`;
      
      let displayStatus = job.status === 'diproses' ? 'Sedang Diproses' : 'Menunggu Antrean';
      
      return `
      <div class="queue-item" style="border-left: 5px solid ${job.status === 'diproses' ? '#f39c12' : '#3498db'};">
        <div class="queue-header">
           <span class="queue-title" style="font-size:1.1rem;"><i class="fas fa-file-pdf" style="color:#e74c3c;"></i> ${fileName}</span>
           <span class="queue-customer" style="color:#1b4b62; font-weight:700; background:#eef2f9; padding:4px 10px; border-radius:20px; font-size:0.8rem;">${job.jenis_cetak}</span>
        </div>
        <div class="queue-progress">
           <span style="font-size:0.85rem; color:#475569; line-height:1.5;">${detailInfo}<br><span style="color:#94a3b8;"><i class="fas fa-clock"></i> Waktu Masuk: ${job.created_at} | Status: <b>${displayStatus}</b></span></span>
        </div>
        <div class="queue-actions" style="margin-top:16px; display:flex; justify-content:space-between; align-items:center; border-top:1px dashed #cbd5e1; padding-top:12px;">
           <span style="font-weight:900; font-size:1.1rem; color:#e67e22;">Rp ${totalHarga.toLocaleString()}</span>
           <div style="display:flex; gap:8px;">
               <button class="downloadBtn" onclick="window.open('http://localhost/fotokopiku/api/orders/uploads/' + encodeURIComponent('${fileName}'), '_blank')" style="background:#3498db; color:white; border:none; padding:8px 16px; border-radius:30px; cursor:pointer; font-weight:600; font-size:0.85rem; transition:0.2s;"><i class="fas fa-download"></i> Unduh Berkas</button>
               
               ${job.status === 'menunggu' || job.status === 'dikonfirmasi' ? 
                 `<button class="startPrintBtn" data-id="${job.id}"><i class="fas fa-print"></i> Proses Pesanan</button>` : 
                 `<button class="markDoneBtn" data-id="${job.id}"><i class="fas fa-check-double"></i> Tandai Selesai</button>`}
           </div>
        </div>
      </div>
    `}).join('');
    
    attachQueueEvents();
  }

  function attachQueueEvents() {
    document.querySelectorAll('.startPrintBtn').forEach(btn => {
        btn.onclick = () => { updateOrderStatus(btn.dataset.id, 'diproses'); };
    });
    document.querySelectorAll('.markDoneBtn').forEach(btn => {
        btn.onclick = () => { updateOrderStatus(btn.dataset.id, 'selesai'); };
    });
  }

  // ========== PENYELESAIAN DAN ARSIP (KOLOM KANAN) ==========
  function renderCompleted() {
    const listContainer = document.getElementById('completedList');
    if (!listContainer) return;
    
    let finishedOrders = allOrders.filter(o => o.status === 'selesai' || o.status === 'siap_diambil');
    
    if (finishedOrders.length === 0) {
        listContainer.innerHTML = '<li style="color:#94a3b8; text-align:center; display:block; padding:20px;">Belum ada data penyelesaian pesanan.</li>';
        return;
    }

    listContainer.innerHTML = finishedOrders.map(job => {
        let fileName = job.nama_file || "Dokumen";
        if(fileName.length > 20) fileName = fileName.substring(0, 20) + '...';
        let timeOnly = job.created_at ? job.created_at.split(' ')[1] : '';
        
        if (job.status === 'selesai') {
            return `
              <li style="background: #e8f8f5; border: 1px solid #a3e4d7; padding: 12px; border-radius: 16px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px;">
                <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
                  <span style="font-weight:bold; color:#117a65; font-size:0.9rem;"><i class="fas fa-box-open"></i> ${fileName}</span>
                  <span style="font-size:0.75rem; color:#76d7c4; font-weight:bold;">${timeOnly}</span>
                </div>
                <div style="font-size:0.75rem; color:#16a085;">Identitas Antrean: <b>${job.queue_num}</b></div>
                <button onclick="updateOrderStatus(${job.id}, 'siap_diambil')" style="background:#27ae60; color:white; border:none; padding:6px 12px; border-radius:20px; cursor:pointer; font-size:0.75rem; font-weight:800; align-self:flex-end; display:inline-flex; align-items:center; gap:5px; transition:0.2s;"><i class="fas fa-clipboard-check"></i> Konfirmasi Pengambilan</button>
              </li>
            `;
        } else {
            return `
              <li style="opacity: 0.6; padding: 8px 10px; background:#f4f6f7; border-radius:12px; margin-bottom:6px; display:flex; justify-content:space-between; width:100%;">
                <span style="font-size:0.85rem;"><i class="fas fa-check-double" style="color:#b45309;"></i> <del>${fileName}</del> (Diserahkan)</span>
                <span style="font-size:0.75rem; color:#94a3b8;">${timeOnly}</span>
              </li>
            `;
        }
    }).join('');
  }
  
  // Sinkronisasi otomatis data secara real-time
  setInterval(() => {
    if(document.getElementById('adminDashboard').style.display !== 'none'){
        fetchOrders();
    }
  }, 3000);

  // ========== KONTROL MODAL ADMIN ==========
  function showStockUpdateModal(stockKey) {
    const displayNames = { paperA4: 'Kertas A4', paperF4: 'Kertas F4', inkBlack: 'Tinta Hitam', inkColor: 'Tinta Warna' };
    const modal = document.createElement('div'); modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal-card">
        <h3><i class="fas fa-box-open"></i> Pembaruan Stok: ${displayNames[stockKey]}</h3>
        <div class="price-input-group"><label>Kapasitas Stok (0-100%)</label><input type="number" id="newStockValue" value="100" min="0" max="100" step="5"></div>
        <div style="display: flex; gap: 16px; margin-top: 24px;">
          <button id="saveStockBtn" class="btn-primary-modern"><i class="fas fa-save"></i> Simpan Perubahan</button>
          <button id="cancelStockBtn" class="btn-secondary-modern">Batal</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('saveStockBtn').onclick = () => {
      const newVal = parseInt(document.getElementById('newStockValue').value);
      if (!isNaN(newVal) && newVal >= 0 && newVal <= 100) {
        stockData[stockKey] = newVal; saveStock();
        if (!hiddenWarnings.includes(stockKey)) hiddenWarnings.push(stockKey);
        saveHiddenWarnings(); modal.remove(); renderAdminDashboard();
        showToast('Kapasitas stok berhasil diperbarui.', 'success');
      }
    };
    document.getElementById('cancelStockBtn').onclick = () => modal.remove();
  }
  
  function showStockManagerModal() {
    const modal = document.createElement('div'); modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal-card" style="max-width: 550px;">
        <h3><i class="fas fa-boxes"></i> Manajemen Kapasitas Stok Lengkap</h3>
        <div class="price-input-group"><label>Persentase Kertas A4</label><input type="number" id="stock_paperA4" value="${Math.round(stockData.paperA4)}"></div>
        <div class="price-input-group"><label>Persentase Kertas F4</label><input type="number" id="stock_paperF4" value="${Math.round(stockData.paperF4)}"></div>
        <div class="price-input-group"><label>Persentase Tinta Hitam</label><input type="number" id="stock_inkBlack" value="${Math.round(stockData.inkBlack)}"></div>
        <div class="price-input-group"><label>Persentase Tinta Warna</label><input type="number" id="stock_inkColor" value="${Math.round(stockData.inkColor)}"></div>
        <div style="display: flex; gap: 16px; margin-top: 24px;">
          <button id="saveAllStockBtn" class="btn-primary-modern"><i class="fas fa-save"></i> Terapkan</button>
          <button id="resetWarningsBtn" class="btn-secondary-modern"><i class="fas fa-bell"></i> Reset Peringatan</button>
          <button id="closeStockModal" class="btn-secondary-modern">Tutup</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('saveAllStockBtn').onclick = () => {
      stockData.paperA4 = parseInt(document.getElementById('stock_paperA4').value) || 0;
      stockData.paperF4 = parseInt(document.getElementById('stock_paperF4').value) || 0;
      stockData.inkBlack = parseInt(document.getElementById('stock_inkBlack').value) || 0;
      stockData.inkColor = parseInt(document.getElementById('stock_inkColor').value) || 0;
      saveStock(); hiddenWarnings = []; saveHiddenWarnings();
      modal.remove(); renderAdminDashboard(); showToast('Manajemen stok berhasil diperbarui.', 'success');
    };
    document.getElementById('resetWarningsBtn').onclick = () => { hiddenWarnings = []; saveHiddenWarnings(); modal.remove(); renderAdminDashboard(); };
    document.getElementById('closeStockModal').onclick = () => modal.remove();
  }
  
  function showPricingModal() { 
    const modal = document.createElement('div'); modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal-card" style="max-width: 650px;">
        <h3><i class="fas fa-tag"></i> Konfigurasi Harga Layanan</h3>
        <h4 style="margin-top:10px; color:#2c7da0; border-bottom:1px solid #eef2f5; padding-bottom:5px;">Layanan Cetak Reguler</h4>
        <div style="display:flex; gap:10px;"><div class="price-input-group" style="flex:1;"><label>BW A4</label><input type="number" id="p_bw_a4" value="${pricing.bw_a4}"></div><div class="price-input-group" style="flex:1;"><label>BW F4</label><input type="number" id="p_bw_f4" value="${pricing.bw_f4}"></div></div>
        <div class="price-input-group"><label>Warna (Kualitas Standar)</label><input type="number" id="p_warna_low" value="${pricing.warna_low}"></div>
        <div class="price-input-group"><label>Warna (Kualitas Menengah)</label><input type="number" id="p_warna_mid" value="${pricing.warna_mid}"></div>
        <div class="price-input-group"><label>Warna (Kualitas Tinggi)</label><input type="number" id="p_warna_hi" value="${pricing.warna_hi}"></div>
        
        <h4 style="margin-top:15px; color:#2c7da0; border-bottom:1px solid #eef2f5; padding-bottom:5px;">Layanan Jilid Dokumen Reguler</h4>
        <div class="price-input-group"><label>Jilid Tipis (≤30 Hal)</label><input type="number" id="p_lakban_1" value="${pricing.lakban_1}"></div>
        <div class="price-input-group"><label>Jilid Menengah (31-60 Hal)</label><input type="number" id="p_lakban_2" value="${pricing.lakban_2}"></div>
        <div class="price-input-group"><label>Jilid Tebal (>60 Hal)</label><input type="number" id="p_lakban_3" value="${pricing.lakban_3}"></div>
        
        <h4 style="margin-top:15px; color:#2c7da0; border-bottom:1px solid #eef2f5; padding-bottom:5px;">Layanan Ekstra & Khusus</h4>
        <div class="price-input-group"><label>Basis Harga Soft Cover</label><input type="number" id="p_soft_1" value="${pricing.soft_1}"></div>
        <div class="price-input-group"><label>Skripsi Soft Cover</label><input type="number" id="p_skripsi_soft" value="${pricing.skripsi_soft}"></div>
        <div class="price-input-group"><label>Skripsi Hard Cover</label><input type="number" id="p_skripsi_hard" value="${pricing.skripsi_hard}"></div>
        <div class="price-input-group"><label>Pemindaian Lengkap & CD</label><input type="number" id="p_scan_cd" value="${pricing.scan_cd}"></div>
        <div class="price-input-group"><label>Laminating</label><input type="number" id="p_laminating" value="${pricing.laminating}"></div>
        
        <div style="display: flex; gap: 16px; margin-top: 24px; justify-content:flex-end;">
          <button id="closePricingModal" class="btn-secondary-modern">Batal</button>
          <button id="savePricingBtn" class="btn-primary-modern"><i class="fas fa-save"></i> Terapkan Pembaruan</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    
    document.getElementById('savePricingBtn').onclick = () => {
      pricing.bw_a4 = parseInt(document.getElementById('p_bw_a4').value) || 250;
      pricing.bw_f4 = parseInt(document.getElementById('p_bw_f4').value) || 300;
      pricing.warna_low = parseInt(document.getElementById('p_warna_low').value) || 500;
      pricing.warna_mid = parseInt(document.getElementById('p_warna_mid').value) || 1000;
      pricing.warna_hi = parseInt(document.getElementById('p_warna_hi').value) || 2000;
      pricing.lakban_1 = parseInt(document.getElementById('p_lakban_1').value) || 3000;
      pricing.lakban_2 = parseInt(document.getElementById('p_lakban_2').value) || 5000;
      pricing.lakban_3 = parseInt(document.getElementById('p_lakban_3').value) || 8000;
      pricing.soft_1 = parseInt(document.getElementById('p_soft_1').value) || 3000;
      pricing.skripsi_soft = parseInt(document.getElementById('p_skripsi_soft').value) || 40000;
      pricing.skripsi_hard = parseInt(document.getElementById('p_skripsi_hard').value) || 45000;
      pricing.scan_cd = parseInt(document.getElementById('p_scan_cd').value) || 20000;
      pricing.laminating = parseInt(document.getElementById('p_laminating').value) || 3000;
      
      savePricing(); modal.remove(); showToast('Harga layanan berhasil diperbarui.', 'success');
    };
    document.getElementById('closePricingModal').onclick = () => modal.remove();
  }
  
  function exportReport() {
    if(allOrders.length === 0) { showToast('Belum ada data transaksi yang dapat diekspor.', 'warning'); return; }
    let csvRows = [["Waktu Masuk", "Identitas Antrean", "Nama Dokumen", "Jenis Layanan", "Total Tagihan", "Status Akhir"]];
    allOrders.forEach(order => { 
        csvRows.push([`"${order.created_at}"`, `"${order.queue_num}"`, `"${order.nama_file}"`, `"${order.jenis_cetak}"`, order.total_tagihan, order.status]); 
    });
    const csvContent = csvRows.map(row => row.join(",")).join("\n");
    const blob = new Blob([csvContent], { type: "text/csv" });
    const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `Laporan_Transaksi_${new Date().toISOString().slice(0,10)}.csv`; link.click(); URL.revokeObjectURL(link.href);
    showToast('Laporan Excel berhasil diekspor.', 'success');
  }
  
  function closeQueueModal() {
    const modal = document.createElement('div'); modal.className = 'modal-overlay';
    modal.innerHTML = `<div class="modal-card" style="text-align:center;">
        <i class="fas fa-store-slash" style="font-size:4rem; color:#e74c3c; margin-bottom:15px;"></i>
        <h3>Pengaturan Status Operasional</h3>
        <p style="margin-bottom:20px; color:#475569;">Jika status operasional diubah menjadi tutup, pemesanan baru tidak akan dapat diproses.</p>
        <div style="background:#eef2fa; padding:16px; border-radius:20px; margin-bottom:20px; font-weight:bold; font-size:1.2rem;">Status Saat Ini: ${queueClosed ? '<span style="color:#e74c3c;">DITUTUP</span>' : '<span style="color:#27ae60;">DIBUKA</span>'}</div>
        <div style="display: flex; gap: 16px; justify-content:center;">
            <button id="toggleQueueBtn" class="btn-primary-modern">${queueClosed ? 'Buka Operasional' : 'Tutup Operasional'}</button>
            <button id="closeQueueModalBtn" class="btn-secondary-modern">Batal</button>
        </div>
    </div>`;
    document.body.appendChild(modal);
    document.getElementById('toggleQueueBtn').onclick = () => {
      queueClosed = !queueClosed;
      localStorage.setItem('fotokopiku_queue_closed', queueClosed);
      modal.remove(); renderAdminDashboard();
      showToast(queueClosed ? 'Status operasional toko: Ditutup.' : 'Status operasional toko: Dibuka.', 'info');
    };
    document.getElementById('closeQueueModalBtn').onclick = () => modal.remove();
  }
  
  document.getElementById('loginForm')?.addEventListener('submit', (e) => { 
    e.preventDefault(); 
    const email=document.getElementById('loginEmail').value, pass=document.getElementById('loginPassword').value, err=document.getElementById('loginErrorMsg'); 
    if(email === adminCred.email && pass === adminCred.password){ 
      document.getElementById('authPage').style.display='none'; 
      document.getElementById('adminDashboard').style.display='block'; 
      renderAdminDashboard(); 
      showToast('Berhasil masuk ke Dasbor Admin.', 'success');
    } else { err.innerText='Kredensial email atau kata sandi tidak valid.'; } 
  });
</script>
