<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Fotokopi Rizqi | Dasbor Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0891b2;
      --primary-dark: #0e7490;
      --primary-darker: #155e75;
      --primary-light: #e0f7fa;
      --primary-lighter: #f0fdfe;
      --accent: #f59e0b;
      --accent-dark: #d97706;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text-dark: #0c1a25;
      --text-mid: #334155;
      --text-light: #64748b;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --surface: #f8fafc;
      --white: #ffffff;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(8,145,178,0.08), 0 1px 4px rgba(0,0,0,0.05);
      --shadow-lg: 0 20px 40px rgba(8,145,178,0.12), 0 4px 8px rgba(0,0,0,0.06);
      --shadow-xl: 0 32px 64px rgba(0,0,0,0.12);
      --radius-sm: 10px;
      --radius: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --font-head: 'Plus Jakarta Sans', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    
    /* Mengurung daftar arsip agar bisa di-scroll */
    .scroll-arsip {
      max-height: 350px;
      overflow-y: auto;
      padding-right: 8px;
    }

    /* Mempercantik tampilan batang scroll-nya */
    .scroll-arsip::-webkit-scrollbar {
      width: 6px;
    }
    .scroll-arsip::-webkit-scrollbar-track {
      background: var(--surface, #f8fafc);
      border-radius: 10px;
    }
    .scroll-arsip::-webkit-scrollbar-thumb {
      background: var(--border, #cbd5e1);
      border-radius: 10px;
    }
    .scroll-arsip::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted, #94a3b8);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f9ff; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 24px 16px; font-family: var(--font-body); }
    .app-container { max-width: 1380px; width: 100%; background: var(--white); border-radius: var(--radius-xl); box-shadow: var(--shadow-xl); overflow: hidden; border: 1px solid rgba(8,145,178,0.08); }

    /* ===== TOAST ===== */
    .custom-toast {
      position: fixed; top: 24px; right: 24px; padding: 14px 22px;
      border-radius: var(--radius); display: none; align-items: center;
      gap: 12px; z-index: 99999; font-weight: 600; font-size: 0.9rem;
      font-family: var(--font-body); transform: translateX(120px); opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 12px 32px rgba(0,0,0,0.15); background: var(--success); color: white;
    }
    .custom-toast.show { transform: translateX(0); opacity: 1; }
    .custom-toast.error { background: var(--danger); }
    .custom-toast.warning { background: var(--warning); }
    .custom-toast.info { background: var(--primary); }

    /* ===== AUTH ===== */
    .auth-wrapper { position: relative; background: linear-gradient(135deg, var(--primary-darker), var(--primary)); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .carousel-container { position: absolute; inset: 0; }
    .carousel-slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s ease-in-out; }
    .carousel-slide.active { opacity: 1; }
    .overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(14,116,144,0.9) 0%, rgba(8,145,178,0.8) 100%); }
    
    .auth-card { position: relative; z-index: 2; background: var(--white); border-radius: var(--radius-xl); padding: 40px 36px; max-width: 440px; width: 92%; margin: 40px auto; box-shadow: 0 32px 72px rgba(0,0,0,0.25); }
    .auth-header { text-align: center; margin-bottom: 28px; }
    .auth-header .shield-icon { width: 68px; height: 68px; background: linear-gradient(135deg, var(--primary-light), #e0f7fa); border: 2px solid rgba(8,145,178,0.2); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 1.8rem; color: var(--primary); }
    .auth-header h2 { font-family: var(--font-head); font-weight: 800; font-size: 1.5rem; color: var(--text-dark); }
    .auth-header p { color: var(--text-light); font-size: 0.85rem; margin-top: 4px; }
    
    .input-group { text-align: left; margin-bottom: 18px; }
    .input-group label { font-weight: 600; display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-mid); font-family: var(--font-head); }
    .input-group input { width: 100%; padding: 12px 18px; border-radius: 60px; border: 1.5px solid var(--border); background: var(--surface); font-family: var(--font-body); font-size: 0.95rem; color: var(--text-dark); transition: border-color 0.2s, box-shadow 0.2s; }
    .input-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(8,145,178,0.12); }
    
    .btn-auth { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; width: 100%; padding: 13px; border-radius: 60px; font-weight: 700; border: none; cursor: pointer; font-size: 0.95rem; font-family: var(--font-head); transition: 0.25s; box-shadow: 0 4px 16px rgba(8,145,178,0.35); }
    .btn-auth:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(8,145,178,0.45); }
    .error-msg { color: var(--danger); font-size: 0.8rem; margin-top: 10px; text-align: center; font-weight: 500; }

    /* ===== DASHBOARD HEADER ===== */
    .dash-header { background: var(--white); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 14px 28px; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
    .dash-brand { display: flex; align-items: center; gap: 12px; }
    .dash-brand .brand-badge { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1rem; }
    .dash-brand h2 { font-family: var(--font-head); font-weight: 800; font-size: 1.1rem; color: var(--text-dark); display: flex; align-items: center; gap: 8px; }
    .admin-pill { background: var(--accent); color: white; font-size: 0.68rem; padding: 3px 10px; border-radius: 60px; font-weight: 700; font-family: var(--font-head); }
    .btn-logout { background: #fff1f2; border: 1px solid #fecdd3; padding: 8px 18px; border-radius: 60px; color: #be123c; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: var(--font-body); font-size: 0.85rem; }
    .btn-logout:hover { background: var(--danger); color: white; border-color: var(--danger); }

    /* ===== MAIN ===== */
    .dashboard-main { padding: 28px; background: var(--surface); min-height: 75vh; }
    
    /* ===== ADMIN LAYOUT ===== */
    .admin-dashboard-container { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
    .admin-left-col, .admin-right-col { display: flex; flex-direction: column; gap: 20px; }
    .admin-card { background: var(--white); border-radius: var(--radius-lg); padding: 22px; box-shadow: var(--shadow-sm); border: 1.5px solid var(--border); transition: box-shadow 0.2s; }
    .admin-card:hover { box-shadow: var(--shadow-md); }
    .admin-card h3 { font-family: var(--font-head); font-size: 1rem; margin-bottom: 16px; color: var(--text-dark); display: flex; align-items: center; gap: 8px; padding-left: 14px; border-left: 3px solid var(--primary); }
    .admin-card h3 i { color: var(--primary); }
    .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--success); font-weight: 600; margin-bottom: 12px; }
    .live-dot { width: 7px; height: 7px; background: var(--success); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }

    /* ===== STOCK WARNING ===== */
    .stock-warning { background: #fffbeb; border: 1.5px solid #fde68a; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; padding: 12px 16px; border-radius: var(--radius); margin-bottom: 12px; }
    .stock-warning strong { font-family: var(--font-head); font-size: 0.88rem; color: #92400e; }
    .stock-warning small { color: #b45309; font-size: 0.78rem; }
    .check-stock-btn { background: var(--success); border: none; padding: 7px 16px; border-radius: 60px; color: white; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.8rem; font-family: var(--font-head); display: inline-flex; align-items: center; gap: 6px; }
    .check-stock-btn:hover { background: #059669; transform: scale(1.02); }
    
    /* ===== CLOSED STATUS ===== */
    .close-queue-status { background: #fff1f2; border: 1.5px solid #fecdd3; color: #be123c; padding: 12px 16px; border-radius: var(--radius); margin-bottom: 14px; text-align: center; font-weight: 700; font-size: 0.88rem; font-family: var(--font-head); }

    /* ===== QUEUE ITEMS ===== */
    .queue-item { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1.5px solid var(--border); transition: 0.2s; }
    .queue-item:hover { border-color: var(--primary); box-shadow: var(--shadow-sm); }
    .queue-header { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; align-items: center; }
    .queue-title { font-family: var(--font-head); font-weight: 700; color: var(--text-dark); font-size: 0.95rem; display: flex; align-items: center; gap: 7px; max-width: 70%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .queue-service-tag { background: var(--primary-light); color: var(--primary-dark); font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 60px; font-family: var(--font-head); }
    .queue-detail { font-size: 0.83rem; color: var(--text-light); line-height: 1.6; }
    .queue-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); flex-wrap: wrap; gap: 8px; }
    .queue-price { font-family: var(--font-head); font-weight: 800; color: var(--accent-dark); font-size: 1rem; }
    .queue-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .queue-actions button { border: none; padding: 7px 14px; border-radius: 60px; cursor: pointer; font-weight: 700; font-size: 0.8rem; font-family: var(--font-head); transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-download { background: var(--primary-light); color: var(--primary-dark); }
    .btn-download:hover { background: var(--primary); color: white; }
    .startPrintBtn { background: #fff3e0; color: #c2410c; border: 1.5px solid #fed7aa !important; }
    .startPrintBtn:hover { background: var(--accent); color: white; border-color: var(--accent) !important; }
    .markDoneBtn { background: #d1fae5; color: #065f46; border: 1.5px solid #6ee7b7 !important; }
    .markDoneBtn:hover { background: var(--success); color: white; border-color: var(--success) !important; }
    .empty-queue { text-align: center; padding: 40px 20px; background: var(--surface); border-radius: var(--radius-lg); border: 2px dashed var(--border); color: var(--text-muted); }
    .empty-queue i { font-size: 2.5rem; color: var(--border); display: block; margin-bottom: 12px; }

    /* ===== STOCK MONITOR ===== */
    .stock-monitor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .stock-label { font-size: 0.8rem; font-weight: 600; color: var(--text-mid); font-family: var(--font-head); margin-bottom: 4px; }
    .stock-percent { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
    .progress-bar-bg { background: var(--border); border-radius: 60px; height: 8px; overflow: hidden; margin: 6px 0 2px; }
    .progress-fill-stock { height: 100%; border-radius: 60px; transition: width 0.5s ease; }

    /* ===== ADMIN ACTION BUTTONS ===== */
    .admin-actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .admin-action-btn { background: var(--surface); border: 1.5px solid var(--border); padding: 12px 10px; border-radius: var(--radius); font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: all 0.25s; text-align: center; color: var(--text-mid); font-family: var(--font-head); display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .admin-action-btn i { font-size: 1.2rem; }
    .admin-action-btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary-dark); transform: translateY(-2px); box-shadow: var(--shadow-md); }

    /* ===== COMPLETED LIST ===== */
    .completed-list { list-style: none; }
    .completed-item { padding: 12px 14px; border-radius: var(--radius); margin-bottom: 8px; display: flex; flex-direction: column; gap: 8px; }
    .completed-item.ready { background: #ecfdf5; border: 1.5px solid #a7f3d0; }
    .completed-item.handed { background: var(--surface); border: 1.5px solid var(--border); opacity: 0.65; }
    .completed-item-header { display: flex; justify-content: space-between; align-items: center; }
    .completed-item-name { font-weight: 700; font-family: var(--font-head); font-size: 0.88rem; color: #065f46; display: flex; align-items: center; gap: 6px; max-width: 60%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .completed-item-time { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; }
    .completed-queue { font-size: 0.75rem; color: #10b981; font-weight: 600; }
    .btn-confirm { background: var(--success); color: white; border: none; padding: 6px 14px; border-radius: 60px; cursor: pointer; font-size: 0.75rem; font-weight: 700; align-self: flex-end; font-family: var(--font-head); display: inline-flex; align-items: center; gap: 5px; transition: 0.2s; }
    .btn-confirm:hover { background: #059669; transform: scale(1.02); }

    /* ===== MODAL ===== */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .modal-card { background: var(--white); border-radius: var(--radius-xl); padding: 30px; max-width: 600px; width: 100%; max-height: 88vh; overflow-y: auto; box-shadow: var(--shadow-xl); animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-card h3 { font-family: var(--font-head); font-size: 1.3rem; margin-bottom: 22px; color: var(--text-dark); display: flex; align-items: center; gap: 10px; padding-left: 14px; border-left: 4px solid var(--primary); }
    .modal-section-title { font-family: var(--font-head); font-size: 0.88rem; font-weight: 700; color: var(--primary-dark); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin: 18px 0 14px; }
    
    .price-input-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 16px; flex-wrap: wrap; }
    .price-input-group label { font-weight: 600; min-width: 180px; font-size: 0.85rem; color: var(--text-mid); font-family: var(--font-head); }
    .price-input-group input { width: 140px; padding: 9px 14px; border-radius: 60px; border: 1.5px solid var(--border); font-family: var(--font-body); font-size: 0.9rem; }
    .price-input-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(8,145,178,0.1); }

    .modal-footer { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
    .btn-primary-modern { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; padding: 11px 22px; border-radius: 60px; color: white; font-weight: 700; cursor: pointer; transition: 0.25s; display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-head); font-size: 0.88rem; box-shadow: 0 4px 12px rgba(8,145,178,0.3); }
    .btn-primary-modern:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(8,145,178,0.4); }
    .btn-secondary-modern { background: var(--surface); border: 1.5px solid var(--border); padding: 11px 22px; border-radius: 60px; color: var(--text-mid); font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-head); font-size: 0.88rem; }
    .btn-secondary-modern:hover { background: var(--border); }

    /* ===== FOOTER ===== */
    .footer-copyright { text-align: center; padding: 18px; background: var(--text-dark); color: var(--text-muted); font-size: 0.78rem; }

    @media (max-width: 1000px) { .admin-dashboard-container { grid-template-columns: 1fr; } }
    @media (max-width: 600px) { .dashboard-main { padding: 14px; } .admin-actions-grid { grid-template-columns: 1fr 1fr; } .dash-header { padding: 12px 16px; } }
  </style>
</head>
<body>

<div id="customToast" class="custom-toast"></div>

<div class="app-container" id="appRoot">
  <div id="authPage"></div>
  <div id="adminDashboard" style="display: none;"></div>
</div>

<script>
  // ========== KREDENSIAL ADMIN ==========
  const adminCred = { email: 'admin@fotokopiku.com', password: 'admin123' };

  document.getElementById('authPage').innerHTML = `
    <div class="auth-wrapper">
      <div class="carousel-container">
        <div class="carousel-slide active" style="background-image: url('https://picsum.photos/id/20/1600/900')"></div>
      </div>
      <div class="overlay"></div>
      <div class="auth-card">
        <div class="auth-header">
          <div class="shield-icon"><i class="fas fa-user-shield"></i></div>
          <h2>Autentikasi Admin</h2>
          <p>Fotokopi Rizqi — Panel Manajemen</p>
        </div>
        <form id="loginForm">
          <div class="input-group"><label><i class="fas fa-envelope" style="color:var(--primary); margin-right:6px;"></i> Alamat Email</label><input type="email" id="loginEmail" placeholder="Ketik email admin di sini..." required></div>
          <div class="input-group"><label><i class="fas fa-lock" style="color:var(--primary); margin-right:6px;"></i> Kata Sandi</label><input type="password" id="loginPassword" placeholder="Ketik sandi rahasia..." required></div>
          <button type="submit" class="btn-auth"><i class="fas fa-sign-in-alt"></i> Masuk Sistem</button>
          <div id="loginErrorMsg" class="error-msg"></div>
        </form>
      </div>
    </div>
  `;

  // ========== PENGATURAN DATA LOKAL ==========
  let pricing = JSON.parse(localStorage.getItem('fotokopiku_pricing')) || {
    bw_a4: 250, bw_f4: 300, warna_low: 500, warna_mid: 1000, warna_hi: 2000,
    lakban_1: 3000, lakban_2: 5000, lakban_3: 8000,
    soft_1: 3000, soft_2: 6000, soft_3: 8000,
    skripsi_soft: 40000, skripsi_hard: 45000, scan_cd: 20000, laminating: 3000
  };
  function savePricing() { localStorage.setItem('fotokopiku_pricing', JSON.stringify(pricing)); }

  let stockData = JSON.parse(localStorage.getItem('fotokopiku_stock')) || { paperA4: 15, paperF4: 80, inkBlack: 45, inkColor: 12 };
  let hiddenWarnings = JSON.parse(localStorage.getItem('fotokopiku_hidden_warnings')) || [];
  function saveStock() { localStorage.setItem('fotokopiku_stock', JSON.stringify(stockData)); }
  function saveHiddenWarnings() { localStorage.setItem('fotokopiku_hidden_warnings', JSON.stringify(hiddenWarnings)); }

  let allOrders = [];
  let queueClosed = localStorage.getItem('fotokopiku_queue_closed') === 'true';

  // ========== SISTEM NOTIFIKASI TOAST ==========
  function showToast(message, type = 'success') {
    const toast = document.getElementById('customToast');
    if (!toast) return;
    let icon = '<i class="fas fa-check-circle" style="font-size:1.2rem;"></i>';
    if (type === 'info') icon = '<i class="fas fa-info-circle" style="font-size:1.2rem;"></i>';
    if (type === 'warning') icon = '<i class="fas fa-exclamation-triangle" style="font-size:1.2rem;"></i>';
    if (type === 'error') icon = '<i class="fas fa-times-circle" style="font-size:1.2rem;"></i>';
    toast.innerHTML = `${icon} <span>${message}</span>`;
    toast.className = 'custom-toast';
    if (type !== 'success') toast.classList.add(type);
    toast.style.display = 'flex';
    toast.offsetHeight;
    toast.classList.add('show');
    setTimeout(() => { toast.classList.remove('show'); setTimeout(() => { toast.style.display = 'none'; }, 400); }, 3000);
  }

  // ========== FUNGSI UPDATE GRAFIK STOK ==========
  function updateStockUI() {
    const monitor = document.getElementById('stockMonitor');
    if(!monitor) return;
    const items = [
      { label: 'Kertas A4', value: stockData.paperA4, color: stockData.paperA4 < 20 ? '#ef4444' : '#0891b2' },
      { label: 'Kertas F4', value: stockData.paperF4, color: '#0891b2' },
      { label: 'Tinta Hitam', value: stockData.inkBlack, color: '#1e293b' },
      { label: 'Tinta Warna', value: stockData.inkColor, color: stockData.inkColor < 20 ? '#ef4444' : '#f59e0b' },
    ];
    monitor.innerHTML = items.map(item => `
      <div class="stock-item">
        <div class="stock-label">${item.label}</div>
        <div class="progress-bar-bg"><div class="progress-fill-stock" style="width:${item.value}%; background:${item.color};"></div></div>
        <div class="stock-percent">${Math.round(item.value)}%</div>
      </div>
    `).join('');
  }

  // ========== KONEKSI API DATABASE ==========
  async function fetchOrders() {
    try {
      const response = await fetch('api/orders/read.php?t=' + Date.now());
      const data = await response.json();
      if (data.status === 'success') {
        allOrders = data.data;
        renderQueue();
        renderCompleted();
      }
    } catch (error) {
      console.error("Kesalahan koneksi ke server:", error);
    }
  }

  // ========== ASYNC UPDATE STATUS ==========
  async function updateOrderStatus(orderId, newStatus) {
    try {
      const response = await fetch('api/orders/update_status.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: orderId, status: newStatus })
      });
      const result = await response.json();
      if(result.status === 'success') {
        const idx = allOrders.findIndex(o => o.id == orderId);
        if(idx !== -1) {
          if (newStatus === 'diproses' && allOrders[idx].status !== 'diproses') {
            let order = allOrders[idx];
            let totalLembar = (parseInt(order.jumlah_halaman) || 1) * (parseInt(order.jumlah_kopian) || 1);
            let biayaKertas = totalLembar * 0.2;
            let biayaTinta = totalLembar * 0.1;
            if (order.ukuran_kertas && order.ukuran_kertas.toLowerCase() === 'f4') {
              stockData.paperF4 = Math.max(0, stockData.paperF4 - biayaKertas);
            } else {
              stockData.paperA4 = Math.max(0, stockData.paperA4 - biayaKertas);
            }
            stockData.inkBlack = Math.max(0, stockData.inkBlack - biayaTinta);
            stockData.inkColor = Math.max(0, stockData.inkColor - (biayaTinta * 0.5));
            saveStock();
            updateStockUI();
          }
          allOrders[idx].status = newStatus;
          renderQueue();
          renderCompleted();
        }
        setTimeout(() => {
          if (newStatus === 'selesai') showToast('Status diperbarui: Dokumen siap untuk diambil.', 'success');
          else if (newStatus === 'siap_diambil') showToast('Transaksi selesai. Dokumen telah diserahkan kepada pelanggan.', 'success');
          else showToast('Mesin dijalankan. Stok kertas & tinta otomatis dikurangi!', 'info');
        }, 100);
        fetchOrders();
      } else {
        showToast("Gagal memperbarui status: " + result.message, 'error');
      }
    } catch (error) {
      console.error("Kesalahan Sistem:", error);
    }
  }

  // ========== MANAJEMEN ANTREAN ==========
  function renderQueue() {
    const queueDiv = document.getElementById('queueList');
    if (!queueDiv) return;
    let activeOrders = allOrders.filter(o => o.status === 'menunggu' || o.status === 'dikonfirmasi' || o.status === 'diproses');
    if (activeOrders.length === 0) {
      queueDiv.innerHTML = `<div class="empty-queue"><i class="fas fa-inbox"></i><h3 style="font-family:var(--font-head); color:var(--text-mid); margin-bottom:6px;">Tidak ada antrean</h3><p style="font-size:0.85rem;">Belum ada pesanan masuk saat ini.</p></div>`;
      return;
    }
    queueDiv.innerHTML = activeOrders.map(job => {
      let fileName = job.nama_file || "Dokumen_Tanpa_Nama.pdf";
      let totalHarga = parseInt(job.total_tagihan) || 0;
      let detailInfo = `${job.ukuran_kertas.toUpperCase()} | ${job.jumlah_halaman} Halaman | ${job.jumlah_kopian} Salinan | Jilid: ${job.jenis_jilid}`;
      let displayStatus = job.status === 'diproses' ? 'Sedang Diproses' : 'Menunggu Antrean';
      let borderColor = job.status === 'diproses' ? '#f59e0b' : '#0891b2';
      return `
        <div class="queue-item" style="border-left:4px solid ${borderColor};">
          <div class="queue-header">
            <div class="queue-title" title="${fileName}"><i class="fas fa-file-pdf" style="color:var(--danger);"></i> ${fileName}</div>
            <span class="queue-service-tag">${job.jenis_cetak}</span>
          </div>
          <div class="queue-detail">
            <div style="margin-bottom: 6px; color: var(--primary-darker); font-weight: 700; font-size: 0.9rem;">
              <i class="fas fa-user-circle"></i> ${job.nama_pelanggan || 'Pelanggan'} &bull; <i class="fas fa-phone-alt"></i> ${job.no_hp || '-'}
            </div>
            ${detailInfo}<br>
            <span style="color:var(--text-muted);"><i class="fas fa-clock"></i> ${job.created_at} &bull; Status: <strong>${displayStatus}</strong></span>
          </div>
          <div class="queue-footer">
            <span class="queue-price">Rp ${totalHarga.toLocaleString()}</span>
            <div class="queue-actions">
              <button class="btn-download" onclick="window.open('api/orders/uploads/' + encodeURIComponent('${fileName}'), '_blank')"><i class="fas fa-download"></i> Unduh</button>
              ${job.status === 'menunggu' || job.status === 'dikonfirmasi'
                ? `<button class="startPrintBtn" data-id="${job.id}"><i class="fas fa-print"></i> Proses Pesanan</button>`
                : `<button class="markDoneBtn" data-id="${job.id}"><i class="fas fa-check-double"></i> Tandai Selesai</button>`}
            </div>
          </div>
        </div>
      `;
    }).join('');
    attachQueueEvents();
  }

  function attachQueueEvents() {
    document.querySelectorAll('.startPrintBtn').forEach(btn => {
      btn.onclick = () => { updateOrderStatus(btn.dataset.id, 'diproses'); };
    });
    document.querySelectorAll('.markDoneBtn').forEach(btn => {
      btn.onclick = () => { updateOrderStatus(btn.dataset.id, 'selesai'); };
    });
  }

  // ========== PENYELESAIAN DAN ARSIP ==========
  function renderCompleted() {
    const listContainer = document.getElementById('completedList');
    if (!listContainer) return;
    let finishedOrders = allOrders.filter(o => o.status === 'selesai' || o.status === 'siap_diambil');
    if (finishedOrders.length === 0) {
      listContainer.innerHTML = '<li style="color:var(--text-muted); text-align:center; display:block; padding:20px; font-size:0.85rem;">Belum ada data penyelesaian pesanan.</li>';
      return;
    }
    listContainer.innerHTML = finishedOrders.map(job => {
      let fileName = job.nama_file || "Dokumen";
      let timeOnly = job.created_at ? job.created_at.split(' ')[1] : '';
      if (job.status === 'selesai') {
        return `
          <li class="completed-item ready">
            <div class="completed-item-header">
              <span class="completed-item-name" title="${fileName}"><i class="fas fa-box-open"></i> ${fileName}</span>
              <span class="completed-item-time">${timeOnly}</span>
            </div>
            <div class="completed-queue">Antrean: <strong>${job.queue_num}</strong> &bull; <small>${job.nama_pelanggan || 'User'}</small></div>
            <button class="btn-confirm" onclick="updateOrderStatus(${job.id}, 'siap_diambil')"><i class="fas fa-clipboard-check"></i> Konfirmasi Pengambilan</button>
          </li>`;
      } else {
        return `
          <li class="completed-item handed">
            <div class="completed-item-header">
              <span style="font-size:0.82rem; color:var(--text-muted);" title="${fileName}"><i class="fas fa-check-double" style="color:var(--accent-dark);"></i> <del>${fileName}</del> <small>(${job.nama_pelanggan || 'User'})</small></span>
              <span class="completed-item-time">${timeOnly}</span>
            </div>
          </li>`;
      }
    }).join('');
  }

  function showStockUpdateModal(stockKey) {
    const displayNames = { paperA4: 'Kertas A4', paperF4: 'Kertas F4', inkBlack: 'Tinta Hitam', inkColor: 'Tinta Warna' };
    const modal = document.createElement('div'); modal.className = 'modal-overlay';

        <div class="modal-footer">
          <button id="saveStockBtn" class="btn-primary-modern"><i class="fas fa-save"></i> Simpan</button>
          <button id="cancelStockBtn" class="btn-secondary-modern">Batal</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    document.getElementById('saveStockBtn').onclick = () => {
      const newVal = parseInt(document.getElementById('newStockValue').value);
      if (!isNaN(newVal) && newVal >= 0 && newVal <= 100) {
        stockData[stockKey] = newVal; saveStock();
        if (!hiddenWarnings.includes(stockKey)) hiddenWarnings.push(stockKey);
        saveHiddenWarnings(); modal.remove(); renderAdminDashboard();
        showToast('Kapasitas stok berhasil diperbarui.', 'success');
      }
    };
    document.getElementById('cancelStockBtn').onclick = () => modal.remove();
  }

  function exportReport() {
    if(allOrders.length === 0) { showToast('Belum ada data transaksi yang dapat diekspor.', 'warning'); return; }
    let csvRows = [["Waktu Masuk", "Identitas Antrean", "Nama Dokumen", "Jenis Layanan", "Total Tagihan", "Status Akhir"]];
    allOrders.forEach(order => {
      csvRows.push([`"${order.created_at}"`, `"${order.queue_num}"`, `"${order.nama_file}"`, `"${order.jenis_cetak}"`, order.total_tagihan, order.status]);
    });
    const csvContent = csvRows.map(row => row.join(",")).join("\n");
    const blob = new Blob([csvContent], { type: "text/csv" });
    const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `Laporan_Transaksi_${new Date().toISOString().slice(0,10)}.csv`; link.click(); URL.revokeObjectURL(link.href);
    showToast('Laporan Excel berhasil diekspor.', 'success');
  }
