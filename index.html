<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Fotokopi Rizqi | Premium Print & Binding</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0891b2;
      --primary-dark: #0e7490;
      --primary-darker: #155e75;
      --primary-light: #e0f7fa;
      --primary-lighter: #f0fdfe;
      --accent: #f59e0b;
      --accent-dark: #d97706;
      --success: #10b981;
      --danger: #ef4444;
      --text-dark: #0c1a25;
      --text-mid: #334155;
      --text-light: #64748b;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --surface: #f8fafc;
      --white: #ffffff;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(8,145,178,0.10), 0 1px 4px rgba(0,0,0,0.06);
      --shadow-lg: 0 20px 40px rgba(8,145,178,0.12), 0 4px 8px rgba(0,0,0,0.08);
      --shadow-xl: 0 32px 64px rgba(0,0,0,0.14);
      --radius-sm: 12px;
      --radius: 20px;
      --radius-lg: 28px;
      --radius-xl: 36px;
      --font-head: 'Plus Jakarta Sans', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f9ff; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 24px 16px; font-family: var(--font-body); }
    
    .app-container { max-width: 1380px; width: 100%; background: var(--white); border-radius: var(--radius-xl); box-shadow: var(--shadow-xl); overflow: hidden; border: 1px solid rgba(8,145,178,0.08); }

    /* ===== TOAST ===== */
    .custom-toast {
      position: fixed; top: 24px; right: 24px; padding: 14px 22px;
      border-radius: var(--radius); display: none; align-items: center;
      gap: 12px; z-index: 99999; font-weight: 600; font-size: 0.9rem;
      font-family: var(--font-body);
      transform: translateX(120px); opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 12px 32px rgba(0,0,0,0.15);
      background: var(--success); color: white;
    }
    .custom-toast.show { transform: translateX(0); opacity: 1; }
    .custom-toast.error { background: var(--danger); }
    .custom-toast.warning { background: var(--accent); }

    /* ===== AUTH ===== */
    .auth-wrapper { position: relative; background: linear-gradient(135deg, var(--primary-darker) 0%, var(--primary) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .carousel-container { position: absolute; inset: 0; }
    .carousel-slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s ease-in-out; }
    .carousel-slide.active { opacity: 1; }
    .overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(14,116,144,0.88) 0%, rgba(8,145,178,0.75) 100%); }
    
    .auth-branding { position: relative; z-index: 2; text-align: center; margin-bottom: 28px; color: white; }
    .auth-branding .brand-icon { width: 72px; height: 72px; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.25); border-radius: 22px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 2rem; }
    .auth-branding h1 { font-family: var(--font-head); font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
    .auth-branding p { opacity: 0.8; font-size: 0.9rem; margin-top: 4px; }

    .auth-card { position: relative; z-index: 2; background: var(--white); border-radius: var(--radius-xl); padding: 36px 32px; max-width: 460px; width: 92%; margin: 40px auto; box-shadow: 0 32px 72px rgba(0,0,0,0.25); }
    
    .auth-tabs { display: flex; gap: 4px; justify-content: center; margin-bottom: 28px; background: var(--surface); border-radius: 60px; padding: 5px; }
    .auth-tab { flex: 1; background: transparent; padding: 10px 20px; border-radius: 60px; font-weight: 600; cursor: pointer; transition: 0.25s; text-align: center; font-family: var(--font-head); font-size: 0.9rem; color: var(--text-light); border: none; }
    .auth-tab.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(8,145,178,0.3); }
    
    .input-group { text-align: left; margin-bottom: 18px; }
    .input-group label { font-weight: 600; display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-mid); font-family: var(--font-head); }
    .input-group input, .input-group select { width: 100%; padding: 12px 18px; border-radius: 60px; border: 1.5px solid var(--border); background: var(--surface); font-family: var(--font-body); font-size: 0.95rem; color: var(--text-dark); transition: border-color 0.2s, box-shadow 0.2s; }
    .input-group input:focus, .input-group select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(8,145,178,0.12); }
    
    .btn-auth { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; width: 100%; padding: 13px; border-radius: 60px; font-weight: 700; border: none; cursor: pointer; font-size: 0.95rem; font-family: var(--font-head); transition: 0.25s; box-shadow: 0 4px 16px rgba(8,145,178,0.35); }
    .btn-auth:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(8,145,178,0.45); }
    .error-msg { color: var(--danger); font-size: 0.8rem; margin-top: 10px; text-align: center; font-weight: 500; }
    .switch-text { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-light); }
    .switch-text a { color: var(--primary); font-weight: 600; cursor: pointer; }

    /* ===== DASHBOARD HEADER ===== */
    .dash-header { background: var(--white); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 14px 28px; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
    .dash-brand { display: flex; align-items: center; gap: 12px; }
    .dash-brand .brand-badge { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.1rem; }
    .dash-brand h2 { font-family: var(--font-head); font-weight: 800; font-size: 1.15rem; color: var(--text-dark); }
    .dash-brand small { color: var(--text-muted); font-size: 0.78rem; display: block; margin-top: 1px; }
    
    .nav-links { display: flex; gap: 6px; align-items: center; }
    .nav-btn { background: transparent; border: none; color: var(--text-light); font-weight: 600; cursor: pointer; padding: 8px 18px; border-radius: 60px; transition: 0.2s; font-family: var(--font-body); font-size: 0.88rem; }
    .nav-btn.active { background: var(--primary-light); color: var(--primary-dark); }
    .nav-btn:hover:not(.active) { background: var(--surface); color: var(--text-dark); }
    
    .cart-icon { position: relative; cursor: pointer; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; background: var(--surface); border-radius: 60px; border: 1px solid var(--border); margin-left: 4px; color: var(--text-mid); transition: 0.2s; }
    .cart-icon:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .cart-count { position: absolute; top: -6px; right: -6px; background: var(--accent); border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; border: 2px solid white; }
    
    .btn-logout { background: #fff1f2; border: 1px solid #fecdd3; padding: 8px 18px; border-radius: 60px; color: #be123c; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: var(--font-body); font-size: 0.85rem; }
    .btn-logout:hover { background: var(--danger); color: white; border-color: var(--danger); }
    
    /* ===== MAIN DASHBOARD ===== */
    .dashboard-main { padding: 28px; background: var(--surface); min-height: 75vh; }
    
    /* ===== HERO BANNER ===== */
    .hero-banner { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-darker) 100%); border-radius: var(--radius-lg); padding: 32px 36px; color: white; margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; position: relative; overflow: hidden; }
    .hero-banner::before { content: ''; position: absolute; top: -40px; right: -40px; width: 220px; height: 220px; background: rgba(255,255,255,0.06); border-radius: 50%; }
    .hero-banner::after { content: ''; position: absolute; bottom: -60px; right: 80px; width: 160px; height: 160px; background: rgba(255,255,255,0.04); border-radius: 50%; }
    .hero-banner h2 { font-family: var(--font-head); font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
    .hero-banner p { opacity: 0.85; font-size: 0.9rem; max-width: 420px; line-height: 1.6; }
    .hero-tag { inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); border-radius: 60px; padding: 6px 14px; font-size: 0.78rem; font-weight: 600; margin-top: 12px; }

    /* ===== SECTION HEADING ===== */
    .section-heading { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .section-heading h3 { font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; color: var(--text-dark); }
    .section-heading .heading-line { flex: 1; height: 1px; background: var(--border); }

    /* ===== SERVICES GRID ===== */
    .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin: 0 0 36px; }
    .service-card { background: var(--white); border-radius: var(--radius-lg); padding: 28px 22px; text-align: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: var(--shadow-sm); border: 1.5px solid var(--border); position: relative; overflow: hidden; }
    .service-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--primary-lighter), transparent); opacity: 0; transition: opacity 0.3s; }
    .service-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
    .service-card:hover::before { opacity: 1; }
    .service-card .icon-wrap { width: 64px; height: 64px; background: var(--primary-light); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; transition: 0.3s; }
    .service-card:hover .icon-wrap { background: var(--primary); }
    .service-card i { font-size: 1.7rem; color: var(--primary); transition: 0.3s; }
    .service-card:hover i { color: white; }
    .service-card h3 { font-family: var(--font-head); font-weight: 700; font-size: 1rem; color: var(--text-dark); margin-bottom: 8px; }
    .service-card p { font-size: 0.8rem; color: var(--text-light); line-height: 1.5; }
    .badge { background: #fef3c7; color: #92400e; display: inline-block; padding: 4px 12px; border-radius: 60px; font-size: 0.7rem; margin-top: 12px; font-weight: 700; font-family: var(--font-head); }
    .badge.blue { background: var(--primary-light); color: var(--primary-dark); }
    .badge.green { background: #d1fae5; color: #065f46; }

    /* ===== PROGRESS SECTION ===== */
    .progress-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; margin-top: 12px; }
    .progress-card { background: var(--white); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-md); border: 1.5px solid var(--border); border-top: 4px solid var(--primary); transition: 0.2s; }
    .progress-card:hover { box-shadow: var(--shadow-lg); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .status-badge { padding: 5px 12px; border-radius: 60px; font-size: 0.72rem; font-weight: 700; background: #fff3e0; color: #c2410c; font-family: var(--font-head); }
    .status-badge.proses { background: var(--primary-light); color: var(--primary-dark); }
    .order-title { font-family: var(--font-head); font-weight: 800; font-size: 1rem; margin: 6px 0 4px; color: var(--text-dark); }
    .order-details { color: var(--text-light); font-size: 0.82rem; margin-bottom: 14px; line-height: 1.6; border-bottom: 1px dashed var(--border); padding-bottom: 10px; }
    .order-total { font-family: var(--font-head); font-weight: 800; font-size: 1.15rem; color: var(--primary-dark); margin: 6px 0; }
    
    .progress-steps { display: flex; align-items: center; justify-content: space-between; margin: 14px 0 10px; gap: 4px; }
    .step { flex: 1; text-align: center; font-size: 0.68rem; font-weight: 600; color: var(--text-muted); font-family: var(--font-head); }
    .step.active { color: var(--primary); }
    .step.completed { color: var(--success); }
    .step i { display: block; font-size: 0.9rem; width: 28px; height: 28px; line-height: 28px; border-radius: 50%; margin: 0 auto 6px; background: var(--surface); }
    .step.active i { background: var(--primary); color: white; }
    .step.completed i { background: var(--success); color: white; }
    .progress-bar-bg { background: var(--border); border-radius: 60px; height: 6px; overflow: hidden; margin: 8px 0; }
    .progress-fill { background: linear-gradient(90deg, var(--primary), #22d3ee); width: 0%; height: 100%; border-radius: 60px; transition: width 0.6s ease; }
    .empty-progress { text-align: center; padding: 48px 20px; background: var(--white); border-radius: var(--radius-lg); color: var(--text-muted); border: 2px dashed var(--border); }
    .empty-progress i { font-size: 2.5rem; margin-bottom: 12px; color: var(--border); display: block; }

    /* ===== SERVICE FORM ===== */
    .service-hero { background: linear-gradient(120deg, var(--primary-lighter), #e0f7fa); border-radius: var(--radius-lg); padding: 28px; text-align: center; margin-bottom: 24px; border: 1px solid rgba(8,145,178,0.12); }
    .service-hero i { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; display: block; }
    .service-hero h1 { font-family: var(--font-head); font-weight: 800; font-size: 1.5rem; color: var(--text-dark); }
    
    .service-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .info-panel, .form-panel { background: var(--white); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); border: 1.5px solid var(--border); }
    .info-panel h3, .form-panel h3 { font-family: var(--font-head); font-weight: 700; font-size: 1rem; color: var(--text-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    
    .price-list { list-style: none; }
    .price-list li { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; color: var(--text-mid); }
    .price-list li:last-child { border-bottom: none; }
    .price-list li span:first-child i { width: 20px; color: var(--primary); margin-right: 6px; }
    .price-tag { color: var(--accent-dark); font-weight: 700; font-family: var(--font-head); }
    
    .form-group { margin-bottom: 18px; }
    .form-group label { font-weight: 600; display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-mid); font-family: var(--font-head); }
    input, select { width: 100%; padding: 11px 16px; border-radius: var(--radius); border: 1.5px solid var(--border); background: var(--surface); font-family: var(--font-body); font-size: 0.9rem; color: var(--text-dark); transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(8,145,178,0.1); }
    
    .upload-area { border: 2px dashed var(--border); border-radius: var(--radius-lg); background: var(--surface); padding: 24px 16px; text-align: center; cursor: pointer; transition: 0.25s; margin-bottom: 10px; }
    .upload-area:hover { border-color: var(--primary); background: var(--primary-lighter); }
    .upload-area i { font-size: 2rem; color: var(--primary); margin-bottom: 8px; display: block; }
    .upload-area p { font-size: 0.85rem; color: var(--text-light); font-weight: 500; }
    
    .price-box { background: linear-gradient(135deg, var(--primary-lighter), #e0f7fa); border: 1px solid rgba(8,145,178,0.2); padding: 13px; border-radius: var(--radius); text-align: center; margin: 14px 0; font-weight: 700; font-family: var(--font-head); font-size: 1rem; color: var(--primary-dark); }
    
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); width: 100%; padding: 13px; border-radius: 60px; color: white; font-weight: 700; border: none; cursor: pointer; margin-top: 8px; transition: 0.25s; font-family: var(--font-head); font-size: 0.9rem; box-shadow: 0 4px 14px rgba(8,145,178,0.3); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(8,145,178,0.4); }
    .btn-secondary { background: #fffbeb; border: 1.5px solid #fde68a; width: 100%; padding: 11px; border-radius: 60px; color: #92400e; font-weight: 700; cursor: pointer; margin-top: 8px; transition: 0.25s; font-family: var(--font-head); font-size: 0.9rem; }
    .btn-cart { background: linear-gradient(135deg, #d1fae5, #a7f3d0); border: 1.5px solid #6ee7b7; color: #065f46; }
    .btn-cart:hover { background: var(--success); color: white; border-color: var(--success); transform: translateY(-1px); }
    .back-home { background: var(--surface); border: 1.5px solid var(--border); padding: 9px 22px; border-radius: 60px; cursor: pointer; margin-bottom: 20px; transition: 0.2s; font-family: var(--font-body); font-size: 0.88rem; color: var(--text-mid); font-weight: 600; }
    .back-home:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

    /* ===== HISTORY & CART ===== */
    .history-list, .cart-list { background: var(--white); border-radius: var(--radius-lg); padding: 8px; border: 1.5px solid var(--border); }
    .history-item, .cart-item { border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; justify-content: space-between; flex-wrap: wrap; align-items: center; gap: 12px; }
    .history-item:last-child, .cart-item:last-child { border-bottom: none; }
    .cart-item-clickable { cursor: pointer; border-radius: var(--radius); transition: background 0.2s; }
    .cart-item-clickable:hover { background: var(--surface); }
    .cart-actions button { background: none; border: none; cursor: pointer; margin-left: 8px; color: var(--danger); font-size: 1rem; padding: 6px; border-radius: 8px; transition: background 0.2s; }
    .cart-actions button:hover { background: #fee2e2; }

    /* ===== MODAL ===== */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .modal-card { background: var(--white); border-radius: var(--radius-xl); padding: 28px; max-width: 480px; width: 100%; max-height: 88vh; overflow-y: auto; box-shadow: var(--shadow-xl); animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-card h3 { font-family: var(--font-head); font-size: 1.4rem; margin-bottom: 16px; color: var(--text-dark); }
    .detail-item { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .detail-label { font-weight: 700; color: var(--primary); margin-bottom: 4px; font-size: 0.8rem; font-family: var(--font-head); text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-value { color: var(--text-dark); font-size: 0.95rem; }
    .edit-field { margin-bottom: 18px; }
    .edit-field label { font-weight: 600; display: block; margin-bottom: 8px; font-size: 0.85rem; font-family: var(--font-head); color: var(--text-mid); }
    .edit-field input, .edit-field select { width: 100%; padding: 10px 14px; border-radius: var(--radius); border: 1.5px solid var(--border); }
    .btn-save-edit { background: var(--success); width: 100%; padding: 12px; border-radius: 60px; color: white; font-weight: 700; border: none; cursor: pointer; margin-top: 14px; font-family: var(--font-head); }
    .btn-edit-detail { background: var(--primary); width: 100%; padding: 12px; border-radius: 60px; color: white; font-weight: 700; border: none; cursor: pointer; margin-top: 14px; font-family: var(--font-head); }
    .btn-cancel { background: var(--surface); width: 100%; padding: 11px; border-radius: 60px; color: var(--text-mid); font-weight: 600; border: 1.5px solid var(--border); cursor: pointer; margin-top: 10px; font-family: var(--font-head); }

    /* ===== FOOTER ===== */
    .footer-info { background: var(--text-dark); color: white; padding: 40px 32px 28px; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 36px; }
    .footer-section h4 { font-family: var(--font-head); font-size: 1rem; margin-bottom: 18px; font-weight: 700; position: relative; display: inline-block; padding-bottom: 10px; }
    .footer-section h4::after { content: ''; position: absolute; bottom: 0; left: 0; width: 32px; height: 3px; background: var(--primary); border-radius: 4px; }
    .footer-section p { margin: 10px 0; line-height: 1.6; opacity: 0.8; display: flex; align-items: center; gap: 10px; font-size: 0.88rem; }
    .footer-section i { width: 20px; color: var(--primary); font-size: 1rem; }
    .footer-section .jam-list { list-style: none; margin-top: 10px; }
    .footer-section .jam-list li { margin: 10px 0; display: flex; justify-content: space-between; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 8px; opacity: 0.8; font-size: 0.85rem; }
    .footer-copyright { text-align: center; padding: 18px; background: rgba(0,0,0,0.3); color: var(--text-muted); font-size: 0.78rem; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .service-layout { grid-template-columns: 1fr; }
      .progress-grid { grid-template-columns: 1fr; }
      .footer-info { grid-template-columns: 1fr; text-align: center; }
      .footer-section h4::after { left: 50%; transform: translateX(-50%); }
      .footer-section p { justify-content: center; }
      .hero-banner { flex-direction: column; }
      .dashboard-main { padding: 16px; }
      .auth-card { padding: 28px 20px; }
    }
    @media (max-width: 600px) {
      body { padding: 12px 8px; }
      .dash-header { padding: 12px 16px; }
      .nav-btn { padding: 7px 12px; font-size: 0.82rem; }
      .services-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .service-card { padding: 20px 14px; }
      .service-card .icon-wrap { width: 50px; height: 50px; }
      .service-card i { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div id="customToast" class="custom-toast"></div>

<div class="app-container" id="appRoot">
  <div id="authPage"></div>
  <div id="userDashboard" style="display: none;"></div>
</div>

<script>
  // ========== TOAST NOTIFICATION SYSTEM ==========
  function showToast(message, type = 'success') {
    const toast = document.getElementById('customToast');
    if (!toast) return;
    let icon = '<i class="fas fa-check-circle" style="font-size:1.2rem;"></i>';
    if (type === 'error') icon = '<i class="fas fa-times-circle" style="font-size:1.2rem;"></i>';
    if (type === 'warning') icon = '<i class="fas fa-exclamation-triangle" style="font-size:1.2rem;"></i>';
    toast.innerHTML = `${icon} <span>${message}</span>`;
    toast.className = 'custom-toast';
    if (type !== 'success') toast.classList.add(type);
    toast.style.display = 'flex';
    toast.offsetHeight;
    toast.classList.add('show');
    setTimeout(() => { toast.classList.remove('show'); setTimeout(() => { toast.style.display = 'none'; }, 400); }, 3000);
  }

  // ========== CAROUSEL & AUTHENTICATION ==========
  let slides = document.querySelectorAll('.carousel-slide');
  let currentSlide = 0;
  setInterval(() => {
    slides[currentSlide]?.classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide]?.classList.add('active');
  }, 5000);

  let users = JSON.parse(localStorage.getItem('fotokopiku_users')) || [];
  users = users.map(u => { if (!u.role) u.role = 'user'; return u; });
  localStorage.setItem('fotokopiku_users', JSON.stringify(users));

  document.getElementById('authPage').innerHTML = `
    <div class="auth-wrapper">
      <div class="carousel-container">
        <div class="carousel-slide active" style="background-image: url('https://picsum.photos/id/20/1600/900')"></div>
        <div class="carousel-slide" style="background-image: url('https://picsum.photos/id/42/1600/900')"></div>
        <div class="carousel-slide" style="background-image: url('https://picsum.photos/id/0/1600/900')"></div>
      </div>
      <div class="overlay"></div>
      <div style="position:relative; z-index:2; width:100%; max-width:460px; margin:40px auto; padding:0 16px;">
        <div class="auth-branding">
          <div class="brand-icon"><i class="fas fa-print"></i></div>
          <h1>Fotokopi Rizqi</h1>
          <p>Platform Layanan Cetak & Penjilidan Digital</p>
        </div>
        <div class="auth-card">
          <div class="auth-tabs">
            <div class="auth-tab active" data-form="login">Masuk</div>
            <div class="auth-tab" data-form="register">Daftar</div>
          </div>
          <div id="loginFormContainer">
            <form id="loginForm">
              <div class="input-group"><label><i class="fas fa-envelope" style="color:var(--primary); margin-right:6px;"></i> Email</label><input type="email" id="loginEmail" placeholder="user@mail.com" required></div>
              <div class="input-group"><label><i class="fas fa-lock" style="color:var(--primary); margin-right:6px;"></i> Kata Sandi</label><input type="password" id="loginPassword" placeholder="••••••••" required></div>
              <button type="submit" class="btn-auth"><i class="fas fa-sign-in-alt"></i> Masuk ke Akun</button>
              <div id="loginErrorMsg" class="error-msg"></div>
            </form>
          </div>
          <div id="registerFormContainer" style="display:none;">
            <form id="registerForm">
              <div class="input-group"><label>Nama Lengkap</label><input type="text" id="regName" placeholder="Nama Lengkap Anda" required></div>
              <div class="input-group"><label>Email</label><input type="email" id="regEmail" placeholder="user@example.com" required></div>
              <div class="input-group"><label>Nomor WhatsApp / HP</label><input type="text" id="regPhone" placeholder="Contoh: 08123456789" required></div>
              <div class="input-group"><label>Kata Sandi</label><input type="password" id="regPassword" placeholder="Minimal 6 karakter" required></div>
              <div class="input-group"><label>Konfirmasi Kata Sandi</label><input type="password" id="regConfirm" required></div>
              <button type="submit" class="btn-auth">Buat Akun Baru</button>
              <div id="registerErrorMsg" class="error-msg"></div>
            </form>
          </div>
          <div class="switch-text"><a id="switchAuth">Belum memiliki akun? Daftar di sini</a></div>
        </div>
      </div>
    </div>
  `;

  // ========== GLOBAL DATA STORE ==========
  let userOrders = [];
  let cartItems = JSON.parse(localStorage.getItem('fotokopiku_cart')) || [];
  function saveCart() { localStorage.setItem('fotokopiku_cart', JSON.stringify(cartItems)); updateCartCount(); }
  function updateCartCount() { document.querySelectorAll('.cart-count').forEach(el => { if(el) el.innerText = cartItems.length; }); }

  // ========== PRICING ENGINE ==========
  function calculateTotal(service, params) {
    if (service === 'Cetak & Fotokopi') {
      let harga_per_lembar = 0;
      if (params.mode === 'bw') harga_per_lembar = (params.kertas === 'f4') ? 300 : 250;
      else if (params.mode === 'warna_hi') harga_per_lembar = 2000;
      else if (params.mode === 'warna_mid') harga_per_lembar = 1000;
      else harga_per_lembar = 500;
      let biaya_cetak = harga_per_lembar * params.halaman;
      let biaya_jilid = 0;
      if (params.spiral) {
        if (params.halaman <= 30) biaya_jilid = 3000;
        else if (params.halaman <= 60) biaya_jilid = 5000;
        else biaya_jilid = 8000;
      }
      let total = (biaya_cetak + biaya_jilid) * params.copy;
      if (params.laminating) total += (3000 * params.copy);
      return total;
    }
    if (service === 'Jilid Skripsi') {
      let hargaCover = params.cover === 'Soft Cover' ? 40000 : 45000;
      return hargaCover * params.eksemplar;
    }
    if (service === 'Scan & Burning CD') return 20000 * params.halaman;
    if (service === 'Jilid Soft Cover') {
      let hargaJilid = params.halaman <= 30 ? 3000 : (params.halaman <= 60 ? 6000 : 8000);
      let hargaCetakKertas = params.halaman * 250;
      return (hargaCetakKertas + hargaJilid) * params.eksemplar;
    }
    return 0;
  }

  function getDetailString(service, params) {
    if (service === 'Cetak & Fotokopi') {
      let modeText = 'Hitam Putih';
      if(params.mode === 'warna_low') modeText = 'Warna (Biasa)';
      if(params.mode === 'warna_mid') modeText = 'Warna (Standar)';
      if(params.mode === 'warna_hi') modeText = 'Warna (Kualitas Tinggi)';
      return `📁 <strong>${params.file_display_name || 'Dokumen'}</strong> <br> ${params.copy} salinan x ${params.halaman} hal (${params.kertas.toUpperCase()}), ${modeText}${params.spiral ? ' + Jilid Lakban' : ''}${params.laminating ? ' + Laminating' : ''}`;
    }
    return `📁 <strong>${params.file_display_name || 'Dokumen'}</strong> <br> ${service === 'Jilid Skripsi' ? params.cover : 'Layanan'} | ${params.eksemplar || 1} Eksemplar`;
  }

  // ========== FILE INSTANT UPLOADER ENGINE ==========
  async function uploadFileHelper(fileInput, textEl) {
    if (!fileInput.files[0]) return null;
    textEl.innerHTML = `<i class="fas fa-spinner fa-spin" style="color:var(--primary);"></i> Mengunggah dokumen...`;
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    try {
      const response = await fetch('api/orders/upload.php', { method: 'POST', body: formData });
      const result = await response.json();
      if (result.status === 'success') {
        textEl.innerHTML = `<span style="color:var(--success); font-weight:bold;"><i class="fas fa-check-circle"></i> Selesai: ${fileInput.files[0].name}</span>`;
        textEl.setAttribute('data-filename', result.file_name);
        textEl.setAttribute('data-displayname', fileInput.files[0].name);
        return result.file_name;
      } else {
        textEl.innerHTML = `<span style="color:var(--danger);">❌ Gagal mengunggah dokumen</span>`;
        return null;
      }
    } catch (err) {
      textEl.innerHTML = `<span style="color:var(--danger);">❌ Terjadi kesalahan koneksi ke server</span>`;
      return null;
    }
  }

  // ========== BACKEND REAL DATABASE CONNECTORS ==========
  async function fetchUserOrders() {
    try {
      const response = await fetch('api/orders/read.php?t=' + Date.now());
      const data = await response.json();
      if (data.status === 'success') {
        const currentUser = getCurrentUserName();
        userOrders = data.data.filter(o => o.nama_pelanggan === currentUser);
        renderActiveProgress();
        renderHistoryPage();
      }
    } catch (error) {
      console.error("Gagal sinkronisasi data:", error);
    }
  }

  async function addOrderDirect(service, params) {
    if (!params.file_name) {
      showToast("Harap tunggu hingga proses unggah dokumen selesai.", 'warning');
      return;
    }
    const total = calculateTotal(service, params);
    const payloadData = {
      jenis_layanan: service,
      nama_file: params.file_name,
      ukuran_kertas: params.kertas || 'A4',
      jumlah_halaman: params.halaman || 1,
      jumlah_kopian: params.copy || params.eksemplar || 1,
      jenis_jilid: params.spiral ? 'Lakban' : (params.cover || 'Tidak Ada'),
      total_tagihan: total,
      nama_pelanggan: getCurrentUserName(),
      no_hp: getCurrentUserPhone() // <--- Terkirim Otomatis!
    };
    try {
      const response = await fetch('api/orders/create.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer TOKEN_USER' },
        body: JSON.stringify(payloadData)
      });
      const result = await response.json();
      if (response.ok) {
        showToast(`Pesanan berhasil dibuat. Nomor Antrean: ${result.queue_num}`, 'success');
        fetchUserOrders();
        document.getElementById('homePage').style.display='block';
        document.getElementById('servicePage').style.display='none';
      } else {
        showToast(`Gagal memproses pesanan: ${result.message}`, 'error');
      }
    } catch (error) {
      showToast("Gagal terhubung ke server. Periksa koneksi Anda.", 'error');
    }
  }

  async function processCheckout() {
    if (cartItems.length === 0) { showToast('Keranjang belanja kosong.', 'warning'); return; }
    if (confirm(`Proses checkout untuk ${cartItems.length} pesanan dengan total Rp ${cartItems.reduce((s,i)=>s+i.total,0).toLocaleString()}?`)) {
      let successCount = 0;
      for (const item of cartItems) {
        const payloadData = {
          jenis_layanan: item.service,
          nama_file: item.params.file_name,
          ukuran_kertas: item.params.kertas || 'A4',
          jumlah_halaman: item.params.halaman || 1,
          jumlah_kopian: item.params.copy || item.params.eksemplar || 1,
          jenis_jilid: item.params.spiral ? 'Lakban' : (item.params.cover || 'Tidak Ada'),
          total_tagihan: item.total,
          nama_pelanggan: getCurrentUserName(),
          no_hp: getCurrentUserPhone() // <--- Terkirim Otomatis!
        };
        try {
          const response = await fetch('api/orders/create.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer TOKEN_USER' },
            body: JSON.stringify(payloadData)
          });
          if (response.ok) successCount++;
        } catch (error) { console.error(error); }
      }
      if (successCount > 0) {
        cartItems = []; saveCart();
        showToast(`${successCount} pesanan berhasil diproses.`, 'success');
        fetchUserOrders();
        renderUserDashboard(getCurrentUserName());
      } else {
        showToast('Seluruh pesanan gagal diproses.', 'error');
      }
    }
  }

  // ========== UI PROGRESS GENERATOR ==========
  function renderActiveProgress() {
    const container = document.getElementById('activeProgressList'); if(!container) return;
    const activeOrders = userOrders.filter(o => o.status !== 'siap_diambil');
    if(activeOrders.length===0) {
      container.innerHTML=`<div class="empty-progress"><i class="fas fa-inbox"></i><p style="font-weight:600; color:var(--text-mid);">Tidak ada pesanan aktif saat ini.</p></div>`;
      return;
    }
    container.innerHTML = `<div class="progress-grid">${activeOrders.map(o => {
      let statusText = 'Menunggu';
      let progressWidth = 20;
      let step1Class = 'completed';
      let step2Class = '';
      let step3Class = '';
      if (o.status === 'diproses') { statusText = 'Diproses'; progressWidth = 55; step2Class = 'active'; }
      else if (o.status === 'selesai') { statusText = 'Siap Diambil'; progressWidth = 100; step2Class = 'completed'; step3Class = 'completed'; }
      let detailText = `<div style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; margin-bottom: 4px;" title="${o.nama_file}">📁 <strong>${o.nama_file}</strong></div>${o.ukuran_kertas.toUpperCase()} | ${o.jumlah_halaman} Halaman | ${o.jumlah_kopian} Kopian | Jilid: ${o.jenis_jilid}`;
      return `
        <div class="progress-card">
          <div class="card-header">
            <div class="status-badge ${o.status === 'selesai' ? '' : 'proses'}">${statusText}</div>
          </div>
          <div class="order-title">${o.jenis_cetak}</div>
          <div class="order-details">${detailText}<br><small style="color:var(--text-muted);"><i class="fas fa-barcode"></i> Antrean: ${o.queue_num}</small></div>
          <div class="order-total">Rp ${parseInt(o.total_tagihan).toLocaleString()}</div>
          <div class="progress-steps">
            <div class="step ${step1Class}"><i class="fas fa-check-circle"></i><span>Diterima</span></div>
            <div class="step ${step2Class}"><i class="fas fa-spinner"></i><span>Diproses</span></div>
            <div class="step ${step3Class}"><i class="fas fa-flag-checkered"></i><span>Selesai</span></div>
          </div>
          <div class="progress-bar-bg"><div class="progress-fill" style="width: ${progressWidth}%;"></div></div>
        </div>`;
    }).join('')}</div>`;
  }

  function renderHistoryPage() {
    const histDiv = document.getElementById('historyListContainer'); if(!histDiv) return;
    if(userOrders.length===0) histDiv.innerHTML='<div class="history-item">Belum ada riwayat pesanan.</div>';
    else histDiv.innerHTML = userOrders.map(o => {
      let displayStatus = o.status === 'siap_diambil' ? 'Telah Diambil' : (o.status === 'selesai' ? 'Siap Diambil' : o.status.toUpperCase());
      return `<div class="history-item"><div><strong style="font-family:var(--font-head); color:var(--text-dark);">${o.jenis_cetak}</strong><br><small style="color:var(--text-light); line-height:1.6;">📁 ${o.nama_file}<br>Jilid: ${o.jenis_jilid}</small></div><div style="text-align:right;"><span style="font-weight:800; color:var(--primary-dark); font-family:var(--font-head);">Rp ${parseInt(o.total_tagihan).toLocaleString()}</span><br><span style="font-size:0.72rem; color:var(--text-muted);">${o.created_at}</span><br><span class="status-badge" style="margin-top:5px; display:inline-block;">${displayStatus}</span></div></div>`;
    }).join('');
  }

  setInterval(() => {
    if(document.getElementById('userDashboard').style.display !== 'none') { fetchUserOrders(); }
  }, 3000);

  // ========== SHOPPING CART MANAGER ==========
  function addToCart(service, params) {
    if (!params.file_name) { showToast("Harap tunggu hingga proses unggah dokumen selesai.", 'warning'); return; }
    const total = calculateTotal(service, params);
    const details = getDetailString(service, params);
    cartItems.push({ id: Date.now(), service, params, total, details, date: new Date().toLocaleString() });
    saveCart(); showToast(`${service} ditambahkan ke keranjang belanja.`, 'success');
  }

  function renderCartPage() {
    const cartDiv = document.getElementById('cartListContainer'); if (!cartDiv) return;
    if (cartItems.length === 0) cartDiv.innerHTML = '<div class="cart-item" style="color:var(--text-muted); text-align:center; padding:24px; justify-content:center;">Keranjang belanja kosong.</div>';
    else {
      cartDiv.innerHTML = cartItems.map((item, idx) => `
        <div class="cart-item cart-item-clickable" data-cart-index="${idx}">
          <div style="flex:1"><strong style="font-family:var(--font-head);">${item.service}</strong><br><small style="line-height:1.5; display:block; margin-top:4px; color:var(--text-light);">${item.details}</small><br><span style="color:var(--accent-dark); font-weight:700; font-family:var(--font-head);">Rp ${item.total.toLocaleString()}</span></div>
          <div class="cart-actions"><button class="remove-cart" data-idx="${idx}"><i class="fas fa-trash-alt"></i></button></div>
        </div>
      `).join('');
      document.querySelectorAll('.remove-cart').forEach(btn => btn.addEventListener('click', (e) => {
        e.stopPropagation(); cartItems.splice(parseInt(btn.dataset.idx), 1); saveCart(); renderCartPage();
      }));
    }
    const checkoutBtn = document.getElementById('checkoutBtn'); if (checkoutBtn) checkoutBtn.onclick = () => processCheckout();
  }

  function getCurrentUserName() { return localStorage.getItem('fotokopiku_current_user') || 'Pengguna'; }
  function getCurrentUserPhone() { return localStorage.getItem('fotokopiku_current_phone') || '-'; }

  // ========== SERVICE EVENT CONTROLLERS ==========
  function setupCetakWithCart() {
    const getParams = () => ({
      file_name: document.getElementById('uploadText_cetak').getAttribute('data-filename') || '',
      file_display_name: document.getElementById('uploadText_cetak').getAttribute('data-displayname') || '',
      mode: document.getElementById('cetakMode').value, kertas: document.getElementById('cetakKertas').value,
      copy: +document.getElementById('cetakCopy').value, halaman: +document.getElementById('cetakHalaman').value,
      spiral: document.getElementById('cetakSpiral').checked, laminating: document.getElementById('cetakLam').checked
    });
    const updateEst = () => { document.getElementById('cetakEstimasi').innerHTML = `💰 Estimasi Biaya: <strong>Rp ${calculateTotal('Cetak & Fotokopi', getParams()).toLocaleString()}</strong>`; };
    document.getElementById('submitCetak').onclick = () => addOrderDirect('Cetak & Fotokopi', getParams());
    document.getElementById('addToCartCetak').onclick = () => addToCart('Cetak & Fotokopi', getParams());
    document.getElementById('fileUpload_cetak')?.addEventListener('change', function() { uploadFileHelper(this, document.getElementById('uploadText_cetak')).then(() => updateEst()); });
    ['cetakMode','cetakKertas','cetakCopy','cetakHalaman','cetakSpiral','cetakLam'].forEach(id => document.getElementById(id)?.addEventListener('input', updateEst));
    updateEst();
  }

  // (Sisa kode fungsi setup layanan lainnya dibiarkan tetap utuh agar tidak error)
  function setupSkripsiWithCart() {
    const getParams = () => ({
      file_name: document.getElementById('uploadText_skripsi').getAttribute('data-filename') || '',
      file_display_name: document.getElementById('uploadText_skripsi').getAttribute('data-displayname') || '',
      cover: document.getElementById('skripsiCover').value, eksemplar: +document.getElementById('skripsiEks').value
    });
    const updateEst = () => { document.getElementById('skripsiEstimasi').innerHTML = `💰 Estimasi Biaya: <strong>Rp ${calculateTotal('Jilid Skripsi', getParams()).toLocaleString()}</strong>`; };
    document.getElementById('submitSkripsi').onclick = () => addOrderDirect('Jilid Skripsi', getParams());
    document.getElementById('addToCartSkripsi').onclick = () => addToCart('Jilid Skripsi', getParams());
    document.getElementById('fileUpload_skripsi')?.addEventListener('change', function() { uploadFileHelper(this, document.getElementById('uploadText_skripsi')).then(() => updateEst()); });
    ['skripsiCover','skripsiEks'].forEach(id => document.getElementById(id)?.addEventListener('input', updateEst));
    updateEst();
  }

  function setupScanWithCart() {
    const getParams = () => ({ file_name: document.getElementById('uploadText_scan').getAttribute('data-filename') || '', file_display_name: document.getElementById('uploadText_scan').getAttribute('data-displayname') || '', halaman: 1 });
    const updateEst = () => { document.getElementById('scanEstimasi').innerHTML = `💰 Estimasi Biaya: <strong>Rp ${calculateTotal('Scan & Burning CD', getParams()).toLocaleString()}</strong>`; };
    document.getElementById('submitScan').onclick = () => addOrderDirect('Scan & Burning CD', getParams());
    document.getElementById('addToCartScan').onclick = () => addToCart('Scan & Burning CD', getParams());
    document.getElementById('fileUpload_scan')?.addEventListener('change', function() { uploadFileHelper(this, document.getElementById('uploadText_scan')).then(() => updateEst()); });
    updateEst();
  }

  function setupSoftWithCart() {
    const getParams = () => ({ file_name: document.getElementById('uploadText_softcover').getAttribute('data-filename') || '', file_display_name: document.getElementById('uploadText_softcover').getAttribute('data-displayname') || '', halaman: +document.getElementById('softHalaman').value, eksemplar: +document.getElementById('softEks').value });
    const updateEst = () => { document.getElementById('softEstimasi').innerHTML = `💰 Estimasi Biaya: <strong>Rp ${calculateTotal('Jilid Soft Cover', getParams()).toLocaleString()}</strong>`; };
    document.getElementById('submitSoft').onclick = () => addOrderDirect('Jilid Soft Cover', getParams());
    document.getElementById('addToCartSoft').onclick = () => addToCart('Jilid Soft Cover', getParams());
    document.getElementById('fileUpload_softcover')?.addEventListener('change', function() { uploadFileHelper(this, document.getElementById('uploadText_softcover')).then(() => updateEst()); });
    ['softHalaman','softEks'].forEach(id => document.getElementById(id)?.addEventListener('input', updateEst));
    updateEst();
  }

  function showServicePage(service) {
    const home = document.getElementById('homePage'), history = document.getElementById('historyPage'), cartPage = document.getElementById('cartPage'), serviceDiv = document.getElementById('servicePage');
    home.style.display = 'none'; history.style.display = 'none'; if(cartPage) cartPage.style.display = 'none'; serviceDiv.style.display = 'block';
    let html = `<div><button class="back-home" id="backHomeBtn"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</button></div>`;
    const getUploadForm = (id) => `
      <div class="form-group">
        <label><i class="fas fa-file-upload" style="color:var(--primary); margin-right:6px;"></i> Unggah Dokumen</label>
        <div class="upload-area" onclick="document.getElementById('fileUpload_${id}').click()">
          <i class="fas fa-cloud-upload-alt"></i>
          <p id="uploadText_${id}">Klik di sini untuk memilih file</p>
          <small style="color:var(--text-muted);">PDF, DOC, DOCX, JPG, PNG</small>
          <input type="file" id="fileUpload_${id}" style="display: none;" accept=".pdf,.doc,.docx,.jpg,.png">
        </div>
      </div>`;

    if (service === 'cetak') {
      html += `
        <div class="service-hero"><i class="fas fa-print"></i><h1>Layanan Cetak & Fotokopi</h1></div>
        <div class="service-layout">
          <div class="info-panel">
            <h3><i class="fas fa-tags" style="color:var(--accent);"></i> Daftar Harga</h3>
            <ul class="price-list">

  // ========== USER AUTHENTICATION ENGINE ==========
  setTimeout(() => {
    const loginDivA = document.getElementById('loginFormContainer'), registerDivA = document.getElementById('registerFormContainer');
    const tabs = document.querySelectorAll('.auth-tab'), switchA = document.getElementById('switchAuth');
    if(tabs.length) tabs.forEach(t=>t.addEventListener('click',()=>{
      tabs.forEach(tt=>tt.classList.remove('active')); t.classList.add('active');
      if(t.dataset.form==='login'){ loginDivA.style.display='block'; registerDivA.style.display='none'; switchA.innerText='Belum memiliki akun? Daftar di sini';}
      else{ loginDivA.style.display='none'; registerDivA.style.display='block'; switchA.innerText='Sudah memiliki akun? Masuk di sini';}
    }));
    if(switchA) switchA.addEventListener('click',()=>{ if(loginDivA.style.display !== 'none') tabs[1].click(); else tabs[0].click(); });

    document.getElementById('registerForm')?.addEventListener('submit', (e) => {
      e.preventDefault();
      const name=document.getElementById('regName').value, email=document.getElementById('regEmail').value, phone=document.getElementById('regPhone').value, pass=document.getElementById('regPassword').value, conf=document.getElementById('regConfirm').value, err=document.getElementById('registerErrorMsg');
      if(!name||!email||!phone||!pass) { err.innerText='Harap isi seluruh bidang formulir.'; return; }
      if(pass!==conf){err.innerText='Konfirmasi kata sandi tidak sesuai.'; return;}
      if(pass.length<6){err.innerText='Kata sandi minimal 6 karakter.'; return;}
      if(users.find(u=>u.email===email)){err.innerText='Alamat email telah terdaftar.'; return;}
      users.push({name, email, no_hp:phone, password:pass, role:'user'});
      localStorage.setItem('fotokopiku_users',JSON.stringify(users));
      showToast('Pendaftaran berhasil. Silakan masuk ke akun Anda.', 'success'); tabs[0].click();
    });

    document.getElementById('loginForm')?.addEventListener('submit', (e) => {
      e.preventDefault();
      const email=document.getElementById('loginEmail').value, pass=document.getElementById('loginPassword').value, err=document.getElementById('loginErrorMsg');
      const user=users.find(u=>u.email===email && u.password===pass);
      if(user && user.role==='user'){
        localStorage.setItem('fotokopiku_current_phone', user.no_hp || '-');
        document.getElementById('authPage').style.display='none'; document.getElementById('userDashboard').style.display='block';
        renderUserDashboard(user.name);
      } else { err.innerText='Kredensial email atau kata sandi tidak valid.'; }
    });
  }, 50);
